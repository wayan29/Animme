    <style>
        .server-v7 { --primary-color: #e74c3c; --secondary-color: #c0392b; --accent-color: #f39c12; }
        .server-v7 .sidebar { background: linear-gradient(180deg, #1a0a0f 0%, #2d1520 100%); }
        .server-v7 .nav-link.active, .server-v7 .nav-link:hover { background: rgba(231, 76, 60, 0.15); border-left-color: var(--primary-color); }
        .server-v7 .topbar { background: linear-gradient(135deg, #1a0a0f 0%, #2d1520 100%); border-bottom: 1px solid rgba(231, 76, 60, 0.3); }
        .genre-hero { margin-bottom: 24px; padding: clamp(22px,4vw,34px); border-radius: 22px; border: 1px solid rgba(231,76,60,.22); background: radial-gradient(circle at 85% 10%, rgba(243,156,18,.16), transparent 28%), linear-gradient(135deg, rgba(45,21,32,.96), rgba(18,10,15,.96)); }
        .genre-hero h1 { margin: 0 0 8px; color: #ffe8e8; font-size: clamp(1.7rem, 3.5vw, 3rem); }
        .genre-hero p { margin: 0; color: rgba(255,232,232,.72); }
        .genre-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; min-width: 0; }
        .genre-card { display: block; padding: 14px 15px; border-radius: 14px; border: 1px solid rgba(231,76,60,.2); background: rgba(26,10,15,.9); color: #ffe8e8; text-decoration: none; font-weight: 800; transition: .2s ease; overflow-wrap: anywhere; }
        .genre-card:hover, .genre-card:focus-visible { transform: translateY(-4px); border-color: rgba(231,76,60,.6); box-shadow: 0 10px 22px rgba(45,21,32,.55); outline: none; }
        .genre-loading, .genre-error { text-align: center; padding: 46px 18px; border-radius: 18px; background: rgba(26,10,15,.82); border: 1px solid rgba(231,76,60,.18); color: rgba(255,232,232,.76); }
        .loading-spinner { display:inline-block; width:46px; height:46px; border:4px solid rgba(231,76,60,.25); border-top-color:var(--primary-color); border-radius:50%; animation:spin 1s linear infinite; margin-bottom:14px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { .home-layout .main-content { padding: 0 14px 60px; } .genre-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .genre-card { font-size: .88rem; padding: 12px; } }
    </style>
</head>
