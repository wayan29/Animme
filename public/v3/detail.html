<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Anime - AnimMe V3</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/mobile.css">
    <style>
        .detail-container {
            max-width: 1400px;
            margin: 100px auto 0;
            padding: 0 4%;
        }
        
        .detail-header {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .detail-poster {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            /* Improve image rendering quality */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            /* Prevent stretching */
            object-fit: cover;
            max-width: 220px;
        }
        
        .detail-info h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #fff;
        }
        
        .detail-synopsis {
            line-height: 1.8;
            margin: 20px 0;
            color: #ddd;
        }
        
        .genre-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .genre-tag {
            background-color: #e50914;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .detail-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 22px 0 0;
        }

        .watch-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #e50914;
            color: #fff;
            padding: 12px 18px;
            border-radius: 6px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
        }

        .watch-btn.secondary {
            background-color: #333;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .watch-btn:hover {
            background-color: #f6121d;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.4);
        }
        
        .info-section {
            background-color: #1a1a1a;
            border-radius: 8px;
            padding: 25px;
            margin: 30px 0;
        }
        
        .info-section h2 {
            color: #e50914;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        
        .info-item {
            display: flex;
            padding: 12px;
            background-color: #222;
            border-radius: 6px;
        }
        
        .info-label {
            color: #999;
            min-width: 120px;
            font-weight: 600;
        }
        
        .info-value {
            color: #fff;
            flex: 1;
        }
        
        .episode-section {
            margin-top: 40px;
        }
        
        .episode-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .episode-btn {
            background-color: #222;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        
        .episode-btn:hover {
            background-color: #e50914;
            border-color: #e50914;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.4);
        }
        
        .batch-section {
            margin-top: 40px;
        }
        
        .batch-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }
        
        .batch-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        
        .batch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
            border-color: rgba(255,255,255,0.5);
        }
        
        .recommendations-section {
            margin-top: 50px;
        }
        
        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .recommendation-card {
            background-color: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
        }
        
        .recommendation-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.3);
        }
        
        .recommendation-poster {
            width: 100%;
            height: 280px;
            object-fit: cover;
            /* Improve image rendering quality */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
        
        .recommendation-info {
            padding: 15px;
        }
        
        .recommendation-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        
        .recommendation-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #999;
            margin-top: 8px;
        }
        
        .recommendation-rating {
            color: #ffd700;
        }
        
        .recommendation-quality {
            background-color: #e50914;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.75rem;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #999;
        }
        
        .error {
            text-align: center;
            padding: 50px;
            color: #e50914;
        }

        .empty-state {
            color: #999;
            text-align: center;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 8px;
            margin-top: 15px;
        }

        .download-link {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }

        .download-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.5);
        }
        
        @media (max-width: 768px) {
            .detail-header {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .detail-poster {
                max-width: 100%;
                width: 100%;
                /* Mobile: use auto rendering for better quality */
                image-rendering: auto;
            }

            .detail-info h1 {
                font-size: 1.8rem;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .detail-actions {
                flex-direction: column;
            }

            .watch-btn {
                width: 100%;
            }

            .episode-list {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }

            .recommendations-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }

        /* Tablet view - medium size poster */
        @media (min-width: 769px) and (max-width: 1024px) {
            .detail-header {
                grid-template-columns: 200px 1fr;
            }

            .detail-poster {
                max-width: 200px;
            }
        }

        /* V3 detail visual refresh - CSS only */
        :root {
            --v3-primary: #e50914;
            --v3-primary-soft: rgba(229, 9, 20, 0.16);
            --v3-surface: rgba(24, 24, 30, 0.86);
            --v3-surface-2: rgba(255, 255, 255, 0.045);
            --v3-border: rgba(255, 255, 255, 0.09);
            --v3-radius: 18px;
            --v3-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
        }

        body.server-v3 {
            background:
                radial-gradient(circle at top left, rgba(229, 9, 20, 0.16), transparent 34rem),
                radial-gradient(circle at top right, rgba(102, 126, 234, 0.12), transparent 30rem),
                #0b0b0f;
        }

        .detail-container {
            max-width: 1320px;
            margin: 96px auto 0;
            padding: 0 clamp(16px, 4vw, 48px) 56px;
        }

        .detail-header {
            display: grid;
            grid-template-columns: 240px minmax(0, 1fr) !important;
            align-items: start;
            gap: 36px;
            margin-bottom: 36px;
            padding: 28px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
            border: 1px solid var(--v3-border);
            border-radius: var(--v3-radius);
            box-shadow: var(--v3-shadow);
            backdrop-filter: blur(10px);
        }

        .detail-poster {
            aspect-ratio: 2 / 3;
            border-radius: 14px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.14);
            background: #151515;
            image-rendering: auto;
            object-fit: cover;
        }

        .detail-info h1 {
            font-size: clamp(2rem, 4vw, 3.25rem);
            line-height: 1.08;
            letter-spacing: -0.04em;
            word-break: break-word;
        }

        .detail-synopsis {
            color: rgba(255,255,255,0.78);
            max-width: 850px;
        }

        .genre-tag {
            background: var(--v3-primary-soft);
            color: #ffb3b7;
            border: 1px solid rgba(229, 9, 20, 0.35);
            border-radius: 999px;
            font-weight: 700;
        }

        .watch-btn {
            border-radius: 999px;
            background: linear-gradient(135deg, #e50914 0%, #b91c1c 100%);
            min-height: 44px;
        }

        .watch-btn.secondary {
            background: rgba(255,255,255,0.08);
        }

        .info-section,
        .episode-section,
        .batch-section,
        .recommendations-section {
            background: var(--v3-surface);
            border: 1px solid var(--v3-border);
            border-radius: var(--v3-radius);
            padding: 24px;
            margin: 28px 0;
            box-shadow: 0 12px 34px rgba(0,0,0,0.22);
        }

        .info-section h2,
        .episode-section h2,
        .batch-section h2,
        .recommendations-section h2 {
            color: #fff;
            margin-bottom: 18px;
            font-size: 1.35rem;
            letter-spacing: -0.02em;
            padding-bottom: 11px;
            border-bottom: 1px solid var(--v3-border);
            position: relative;
        }

        .info-section h2::after,
        .episode-section h2::after,
        .batch-section h2::after,
        .recommendations-section h2::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -1px;
            width: 44px;
            height: 3px;
            border-radius: 999px;
            background: var(--v3-primary);
        }

        .info-item,
        .episode-btn,
        .recommendation-card,
        .quality-group,
        .empty-state {
            background: var(--v3-surface-2);
            border: 1px solid var(--v3-border);
            border-radius: 12px;
        }

        .info-label {
            flex: 0 0 130px;
            color: rgba(255,255,255,0.55);
        }

        .info-value {
            color: rgba(255,255,255,0.92);
            word-break: break-word;
        }

        .episode-list {
            grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
            max-height: 620px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .episode-btn {
            border-width: 1px;
            border-radius: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .episode-btn:hover,
        .episode-btn:focus-visible {
            background: rgba(229, 9, 20, 0.16);
            border-color: rgba(229, 9, 20, 0.65);
            box-shadow: 0 10px 22px rgba(229, 9, 20, 0.22);
            outline: none;
        }

        .batch-btn,
        .download-link {
            border-radius: 12px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .recommendations-grid {
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 18px;
        }

        .recommendation-card {
            transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
        }

        .recommendation-card:hover,
        .recommendation-card:focus-visible {
            border-color: rgba(229, 9, 20, 0.45);
            outline: none;
        }

        .recommendation-poster {
            aspect-ratio: 2 / 3;
            height: auto;
            image-rendering: auto;
        }

        .recommendation-title {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.7em;
        }

        .recommendation-quality {
            border-radius: 999px;
            background: var(--v3-primary-soft);
            color: #ffb3b7;
            border: 1px solid rgba(229,9,20,0.35);
        }

        .watch-btn:focus-visible,
        .episode-btn:focus-visible,
        .batch-btn:focus-visible,
        .download-link:focus-visible,
        .recommendation-card:focus-visible {
            outline: 3px solid rgba(255,255,255,0.75);
            outline-offset: 3px;
        }

        .batch-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            overflow-y: auto;
            padding: 24px;
            backdrop-filter: blur(8px);
        }

        .batch-modal-inner {
            max-width: 840px;
            margin: 50px auto;
            background: linear-gradient(180deg, #1b1b22, #131318);
            border: 1px solid var(--v3-border);
            border-radius: var(--v3-radius);
            padding: 30px;
            position: relative;
            box-shadow: 0 24px 70px rgba(0,0,0,0.55);
        }

        .batch-modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: #e50914;
            color: #fff;
            border: none;
            padding: 10px 14px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 800;
            box-shadow: 0 8px 20px rgba(229,9,20,0.28);
        }

        #batchModalContent h2 {
            color: #fff;
            margin-bottom: 1rem;
        }

        #batchModalContent .download-link {
            margin: 4px;
        }

        @media (max-width: 768px) {
            .detail-container {
                margin-top: clamp(80px, 12vh, 120px);
            }

            .detail-header {
                grid-template-columns: 1fr !important;
                padding: 18px;
                border-radius: 16px;
            }

            .info-item {
                flex-direction: column;
                gap: 4px;
            }

            .info-label {
                flex: 0 0 auto;
            }

            .episode-list,
            .recommendations-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .batch-modal {
                padding: 14px;
            }

            .batch-modal-inner {
                margin: 20px auto;
                padding: 22px 18px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }
    </style>
</head>
<body class="server-v3">
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo" id="homeLogo">AnimMe V3</h1>
            <div class="server-selector">
                <select id="serverSelect" class="server-select">
                    <option value="v1">V1 - Otakudesu</option>
                    <option value="v2">V2 - Samehadaku</option>
                    <option value="v3" selected>V3 - Kuramanime</option>
                    <option value="v4">V4 - Anichin</option>
                    <option value="v5">V5 - Anoboy</option>
                    <option value="v6">V6 - AnimeIndo</option>
                    <option value="v7">V7 - Nekopoi</option>
                    <option value="v8">V8 - Kusonime</option>
                    <option value="v9">V9 - Auratail</option>
                    <option value="v10">V10 - Vidku</option>
                </select>
            </div>
            <div class="nav-menu">
                <a href="/v3/home" class="nav-link">Beranda</a>
                <a href="/v3/search" class="nav-link">Cari Anime</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="detail-container" id="detailContent">
            <div class="loading">Memuat detail anime...</div>
        </div>
    </main>

    <!-- Batch Download Modal -->
    <div id="batchModal" class="batch-modal" style="display:none;">
        <div class="batch-modal-inner">
            <button id="closeBatchModalBtn" type="button" class="batch-modal-close">✕ Tutup</button>
            <div id="batchModalContent"></div>
        </div>
    </div>

    <script>
        const FALLBACK_POSTER = '/placeholder.svg';
        const enc = value => encodeURIComponent(String(value ?? ''));
        const escapeHtml = value => String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
        const escapeAttribute = escapeHtml;
        function safeUrl(value, fallback = '#') {
            const raw = String(value ?? '').trim();
            if (!raw) return fallback;

            try {
                const url = new URL(raw, window.location.origin);
                return ['http:', 'https:'].includes(url.protocol) ? url.href : fallback;
            } catch {
                return fallback;
            }
        }
        function imageUrl(value) { return safeUrl(value, FALLBACK_POSTER); }
        function bindFallbackImages(root = document) {
            root.querySelectorAll('img[data-fallback-image]').forEach(img => {
                img.addEventListener('error', () => {
                    const fallback = img.dataset.fallbackImage || FALLBACK_POSTER;
                    const fallbackUrl = new URL(fallback, window.location.origin).href;
                    if (img.src !== fallbackUrl) {
                        img.src = fallback;
                    }
                }, { once: true });
            });
        }

        function extractEpisodeNum(episode, fallback = '1') {
            const explicitNum = episode?.episode_num;
            if (explicitNum !== undefined && explicitNum !== null && String(explicitNum).trim()) {
                return String(explicitNum).trim();
            }

            const title = String(episode?.title ?? '');
            const url = String(episode?.url ?? '');
            const match = title.match(/Episode\s+(\d+)/i) || url.match(/episode\/(\d+)/);
            return match ? match[1] : fallback;
        }

        // Extract animeId and slug from URL (support both path and query params)
        const urlParams = new URLSearchParams(window.location.search);
        let animeId = urlParams.get('animeId');
        let slug = urlParams.get('slug');
        
        // Fallback to path-based params if query params not found
        if (!animeId || !slug) {
            const segments = window.location.pathname.split('/').filter(Boolean);
            const detailIndex = segments.indexOf('detail');
            if (detailIndex !== -1 && segments.length > detailIndex + 2) {
                animeId = segments[detailIndex + 1];
                slug = segments.slice(detailIndex + 2).join('/');
            }
        }

        async function loadAnimeDetail() {
            if (!animeId || !slug) {
                showError('Parameter detail tidak valid');
                return;
            }
            try {
                const response = await fetch(`/api/v3/kuramanime/anime/${enc(animeId)}/${enc(slug)}`);
                const result = await response.json();
                if (result.status === 'success') {
                    displayAnimeDetail(result.data || {});
                } else {
                    showError('Gagal memuat detail anime');
                }
            } catch (error) {
                console.error('Error loading anime detail:', error);
                showError('Terjadi kesalahan saat memuat data');
            }
        }

        function displayAnimeDetail(anime) {
            const container = document.getElementById('detailContent');
            const genres = Array.isArray(anime.genres) ? anime.genres : [];
            const info = anime.info && typeof anime.info === 'object' ? anime.info : {};
            const episodes = Array.isArray(anime.episodes) ? anime.episodes : [];
            const batchList = Array.isArray(anime.batch_list) ? anime.batch_list : [];
            const recommendations = Array.isArray(anime.anime_lainnya) ? anime.anime_lainnya : [];
            const title = String(anime.title || 'Detail Anime');
            const poster = imageUrl(anime.poster);
            const realGenres = genres.filter(g => {
                const lower = String(g ?? '').toLowerCase();
                return !lower.includes('sunrise') && !lower.includes('/') && !lower.includes('orang') && !lower.includes('pg-') && !lower.includes('bglobal');
            });
            const animeIdParam = enc(animeId);
            const slugParam = enc(slug);
            const episodeItems = episodes
                .map(episode => {
                    const epNum = extractEpisodeNum(episode, '');
                    const epTitle = String(episode?.title || `Episode ${epNum}`);
                    return { epNum, epTitle };
                })
                .filter(item => item.epNum)
                .sort((a, b) => Number(a.epNum) - Number(b.epNum));
            const firstEpisode = episodeItems[0];
            const latestEpisode = episodeItems[episodeItems.length - 1];
            const buildEpisodeHref = epNum => `/v3/episode?animeId=${animeIdParam}&slug=${slugParam}&episode=${enc(epNum)}`;
            
            container.innerHTML = `
                <div class="detail-header">
                    <div>
                        <img src="${escapeAttribute(poster)}" alt="${escapeAttribute(title)}" class="detail-poster" data-fallback-image="${escapeAttribute(FALLBACK_POSTER)}">
                    </div>
                    <div class="detail-info">
                        <h1>${escapeHtml(title)}</h1>
                        ${realGenres.length > 0 ? `<div class="genre-list">${realGenres.map(genre => `<span class="genre-tag">${escapeHtml(String(genre).replace(',', ''))}</span>`).join('')}</div>` : ''}
                        <div class="detail-synopsis"><strong>Sinopsis:</strong><br>${escapeHtml(anime.synopsis || 'Tidak ada sinopsis tersedia.')}</div>
                        ${firstEpisode ? `<div class="detail-actions">
                            <a href="${escapeAttribute(buildEpisodeHref(firstEpisode.epNum))}" class="watch-btn" title="${escapeAttribute(firstEpisode.epTitle)}">▶ Mulai Nonton</a>
                            ${latestEpisode && latestEpisode.epNum !== firstEpisode.epNum ? `<a href="${escapeAttribute(buildEpisodeHref(latestEpisode.epNum))}" class="watch-btn secondary" title="${escapeAttribute(latestEpisode.epTitle)}">⏭ Episode Terbaru</a>` : ''}
                        </div>` : ''}
                    </div>
                </div>
                <div class="info-section">
                    <h2>📋 Informasi Anime</h2>
                    <div class="info-grid">
                        ${Object.entries(info).map(([key, value]) => {
                            const textValue = String(value ?? '').replace(/\s+/g, ' ').trim();
                            if (!textValue || textValue === '?') return '';
                            const label = String(key).split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                            return `<div class="info-item"><span class="info-label">${escapeHtml(label)}:</span><span class="info-value">${escapeHtml(textValue)}</span></div>`;
                        }).join('')}
                    </div>
                </div>
                <div class="episode-section"><h2>📺 Daftar Episode (${episodeItems.length})</h2>
                    ${episodeItems.length > 0 ? `<div class="episode-list">
                        ${episodeItems.map(({ epNum, epTitle }) => {
                            return `<a href="/v3/episode?animeId=${animeIdParam}&slug=${slugParam}&episode=${enc(epNum)}" class="episode-btn" title="${escapeAttribute(epTitle)}">${escapeHtml(epTitle)}</a>`;
                        }).join('')}
                    </div>` : '<p class="empty-state">Episode belum tersedia.</p>'}
                </div>
                <div class="batch-section"><h2>📦 Batch Download (${batchList.length})</h2>
                    ${batchList.length > 0 ? `<div class="batch-list">
                        ${batchList.map(batch => {
                            const batchTitle = String(batch?.title || 'Batch Download');
                            return `<a href="#" class="batch-btn" data-anime-id="${escapeAttribute(animeId)}" data-slug="${escapeAttribute(slug)}" data-range="${escapeAttribute(batch?.range || '')}" data-title="${escapeAttribute(batchTitle)}" title="Download ${escapeAttribute(batchTitle)}">${escapeHtml(batchTitle)}</a>`;
                        }).join('')}
                    </div>` : '<p class="empty-state">Batch download belum tersedia.</p>'}
                </div>
                <div class="recommendations-section"><h2>🎬 Anime Lainnya / Rekomendasi</h2>
                    ${recommendations.length > 0 ? `<div class="recommendations-grid">
                        ${recommendations.map(rec => {
                            const recTitle = String(rec?.title || 'Anime');
                            return `<a href="/v3/detail?animeId=${enc(rec?.anime_id)}&slug=${enc(rec?.slug)}" class="recommendation-card">
                                <img src="${escapeAttribute(imageUrl(rec?.poster))}" alt="${escapeAttribute(recTitle)}" class="recommendation-poster" data-fallback-image="${escapeAttribute(FALLBACK_POSTER)}">
                                <div class="recommendation-info"><div class="recommendation-title">${escapeHtml(recTitle)}</div><div class="recommendation-meta"><span class="recommendation-rating">⭐ ${escapeHtml(rec?.rating || '-')}</span>${rec?.quality ? `<span class="recommendation-quality">${escapeHtml(rec.quality)}</span>` : ''}</div></div>
                            </a>`;
                        }).join('')}
                    </div>` : '<p class="empty-state">Rekomendasi belum tersedia.</p>'}
                </div>
            `;
            bindFallbackImages(container);
        }

        function showError(message) {
            const container = document.getElementById('detailContent');
            container.innerHTML = `<div class="error"><h2>❌ ${escapeHtml(message)}</h2><p>Silakan coba lagi nanti atau kembali ke <a href="/v3/home">beranda</a>.</p><button type="button" class="watch-btn" id="retryDetailBtn">Coba Lagi</button></div>`;
            document.getElementById('retryDetailBtn')?.addEventListener('click', loadAnimeDetail);
        }

        async function openBatchModal(animeId, slug, range) {
            const modal = document.getElementById('batchModal');
            const content = document.getElementById('batchModalContent');
            modal.style.display = 'block';
            content.innerHTML = '<div style="text-align:center; padding:30px; color:#fff;"><h3>Memuat download links...</h3></div>';
            try {
                const response = await fetch(`/api/v3/kuramanime/batch/${enc(animeId)}/${enc(slug)}/${enc(range)}`);
                const result = await response.json();
                if (result.status === 'success') displayBatchDownloads(result.data || {});
                else content.innerHTML = '<div style="color:#e50914; text-align:center; padding:30px;"><h3>Gagal memuat download links</h3></div>';
            } catch (error) {
                console.error('Error loading batch:', error);
                content.innerHTML = '<div style="color:#e50914; text-align:center; padding:30px;"><h3>Terjadi kesalahan saat memuat data</h3></div>';
            }
        }
        
        function displayBatchDownloads(batch) {
            const content = document.getElementById('batchModalContent');
            const groupedLinks = Object.create(null);
            const links = Array.isArray(batch.download_links) ? batch.download_links : [];
            links.forEach(link => {
                const quality = String(link?.quality || 'Unknown Quality');
                if (!groupedLinks[quality]) groupedLinks[quality] = [];
                groupedLinks[quality].push(link);
            });
            content.innerHTML = `
                <h2 style="color:#fff; margin-bottom:20px;">${escapeHtml(batch.title || 'Batch Download')}</h2>
                ${batch.synopsis ? `<div style="color:#ddd; margin-bottom:20px; line-height:1.6;"><strong>Sinopsis:</strong> ${escapeHtml(batch.synopsis)}</div>` : ''}
                ${Object.keys(groupedLinks).length > 0 ? `<div style="margin-top:30px;"><h3 style="color:#fff; margin-bottom:15px;">📥 Download Links:</h3>
                    ${Object.entries(groupedLinks).map(([quality, qualityLinks]) => `<div style="background:#222; padding:20px; border-radius:8px; margin-bottom:20px;"><h4 style="color:#e50914; margin-bottom:15px;">${escapeHtml(quality)}</h4><div style="display:flex; flex-wrap:wrap; gap:10px;">
                        ${qualityLinks.map(link => `<a href="${escapeAttribute(safeUrl(link?.url))}" target="_blank" rel="noopener noreferrer" class="download-link">${escapeHtml(link?.provider || 'Download')}</a>`).join('')}
                    </div></div>`).join('')}
                </div>` : '<p style="color:#999; text-align:center; padding:20px;">Download links tidak tersedia</p>'}
            `;
        }
        
        function closeBatchModal() { document.getElementById('batchModal').style.display = 'none'; }
        document.getElementById('homeLogo')?.addEventListener('click', () => { window.location.href = '/v3/home'; });
        document.getElementById('closeBatchModalBtn')?.addEventListener('click', closeBatchModal);
        document.getElementById('batchModal')?.addEventListener('click', (e) => { if (e.target.id === 'batchModal') closeBatchModal(); });
        document.getElementById('detailContent')?.addEventListener('click', (e) => {
            const btn = e.target.closest('.batch-btn');
            if (!btn) return;
            e.preventDefault();
            openBatchModal(btn.dataset.animeId, btn.dataset.slug, btn.dataset.range);
        });

        document.getElementById('serverSelect').addEventListener('change', (e) => {
            const server = e.target.value;
            localStorage.setItem('selectedServer', server);
            if (server === 'v3') window.location.href = '/v3/home';
            else if (server === 'v2') window.location.href = '/v2/home';
            else window.location.href = '/v1/home';
        });

        loadAnimeDetail();
    </script>
    <script src="/shared/server-select.js"></script>
</body>
</html>
