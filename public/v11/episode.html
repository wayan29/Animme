<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>V11 Episode</title><link rel="stylesheet" href="/styles.css"><link rel="stylesheet" href="/mobile.css"><link rel="stylesheet" href="/v11/v11.css"></head><body class="server-v11"><div class="home-layout" id="app"></div><script src="/v11/v11.js"></script><script src="/server-select.js"></script><script>
const p=V11.params(); const slug=p.get('slug')||''; const episode=p.get('episode')||''; const episodeId=p.get('id')||'';
app.innerHTML=V11.shell('list')+`<main class="main-content">${V11.topbar()}<div id="content"><div class="loading">Memuat episode...</div></div></main>`; V11.bindSearch();
function setPlayer(url){V11.$('#player').innerHTML=`<iframe src="${V11.escapeHtml(url)}" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>`;}
(async()=>{try{const apiPath=episodeId?`/api/v11/oploverz/episode-id/${V11.enc(episodeId)}`:`/api/v11/oploverz/episode/${V11.enc(slug)}/${V11.enc(episode)}`; const d=await V11.api(apiPath); document.title=`${d.series_title} Episode ${d.episode_num}`; const streams=d.streams||[]; V11.$('#content').innerHTML=`<section class="two-col"><div><h1>${V11.escapeHtml(d.series_title)} Episode ${V11.escapeHtml(d.episode_num)}</h1><p class="muted">Source: ${V11.escapeHtml(d.source||'')}</p><div class="player-wrap" id="player"><div class="loading">Pilih server.</div></div><div class="section"><div class="section-header"><h2>Server Streaming</h2></div><div class="pagination">${streams.map((s,i)=>`<button class="btn ${i?'secondary':''}" data-url="${V11.escapeHtml(s.url)}">${V11.escapeHtml(s.source||s.server)}</button>`).join('')}</div></div><div class="pagination">${d.previous_episode?`<a class="btn secondary" href="/v11/episode?slug=${V11.enc(d.series_slug)}&episode=${V11.enc(d.previous_episode)}">← Prev</a>`:''}<a class="btn secondary" href="/v11/detail?slug=${V11.enc(d.series_slug)}">Detail</a>${d.next_episode?`<a class="btn secondary" href="/v11/episode?slug=${V11.enc(d.series_slug)}&episode=${V11.enc(d.next_episode)}">Next →</a>`:''}</div></div><aside class="panel"><img src="${V11.escapeHtml(d.poster||'')}" style="width:100%;border-radius:14px" onerror="this.style.display='none'"><h3>Download</h3>${(d.downloads||[]).map(g=>`<div><strong>${V11.escapeHtml(g.format)} ${V11.escapeHtml(g.quality)}</strong><div>${g.links.map(l=>`<a class="pill" target="_blank" rel="noopener" href="${V11.escapeHtml(l.url)}">${V11.escapeHtml(l.host)}</a>`).join('')}</div></div>`).join('')||'<p class="muted">Tidak ada link download.</p>'}</aside></section>`; document.querySelectorAll('[data-url]').forEach(btn=>btn.addEventListener('click',()=>setPlayer(btn.dataset.url))); if(streams[0]) setPlayer(streams[0].url);}catch(e){V11.$('#content').innerHTML=`<div class="error">${V11.escapeHtml(e.message)}</div>`;}})();
</script></body></html>
