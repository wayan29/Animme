<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>V11 Anime List</title><link rel="stylesheet" href="/styles.css"><link rel="stylesheet" href="/mobile.css"><link rel="stylesheet" href="/v11/v11.css"></head><body class="server-v11"><div class="home-layout" id="app"></div><script src="/v11/v11.js"></script><script src="/server-select.js"></script><script>
const qs=V11.params(); const page=Math.max(1,parseInt(qs.get('page')||'1',10));
const filterKeys=['hot','mature','censored','season','genres','genre','type','sortBy','sort_by','pageSize'];
function currentFilterParams(nextPage=page){const p=new URLSearchParams(); p.set('page',nextPage); filterKeys.forEach(k=>{const v=qs.get(k); if(v) p.set(k,v);}); return p.toString();}
function setFilter(){const p=new URLSearchParams(); const sort=V11.$('#sortSelect').value; const genre=V11.$('#genreSelect').value; const type=V11.$('#typeSelect').value; const pageSize=V11.$('#pageSizeSelect').value; const season=V11.$('#seasonInput').value.trim(); if(sort&&sort!=='default')p.set('sortBy',sort); if(genre)p.set('genres',genre); if(type)p.set('type',type); if(pageSize&&pageSize!=='10')p.set('pageSize',pageSize); if(season)p.set('season',season); location.href=`/v11/anime-list?${p.toString()}`;}
app.innerHTML=V11.shell('list')+`<main class="main-content">${V11.topbar()}<section class="hero"><h1>Anime List</h1><p class="muted">Halaman ${page}</p><div class="pagination"><select id="sortSelect"><option value="default">Urutkan Berdasarkan: Default</option><option value="releaseDate-desc">Tanggal Rilis (Terbaru)</option><option value="releaseDate-asc">Tanggal Rilis (Terlama)</option><option value="createdAt-desc">Dibuat (Terbaru)</option><option value="createdAt-asc">Dibuat (Terlama)</option><option value="title-asc">Judul (A-Z)</option><option value="title-desc">Judul (Z-A)</option></select><select id="genreSelect"><option value="">Pilih Genre</option></select><select id="typeSelect"><option value="">Pilih Tipe</option><option>BD</option><option>Movie</option><option>ONA</option><option>OVA</option><option>Special</option><option>TV</option></select><select id="pageSizeSelect"><option value="10">10 item</option><option value="20">20 item</option><option value="50">50 item</option></select><input id="seasonInput" class="search-input" style="max-width:220px" placeholder="season: summer-2025"><button id="applyBtn" class="btn">Terapkan</button><a class="btn secondary" href="/v11/anime-list?hot=true">🔥 Hot</a><a class="btn secondary" href="/v11/anime-list?mature=false">Safe</a><a class="btn secondary" href="/v11/anime-list?censored=false">Uncensored</a><a class="btn secondary" href="/v11/anime-list">Reset</a></div></section><div class="grid" id="grid"><div class="loading">Memuat...</div></div><div class="pagination" id="pager"></div></main>`; V11.bindSearch();
V11.$('#sortSelect').value=qs.get('sortBy')||qs.get('sort_by')||'default'; V11.$('#typeSelect').value=qs.get('type')||''; V11.$('#pageSizeSelect').value=qs.get('pageSize')||'10'; V11.$('#seasonInput').value=qs.get('season')||''; V11.$('#applyBtn').addEventListener('click',setFilter);
(async()=>{try{const [genres,data]=await Promise.all([V11.api('/api/v11/oploverz/genres'),V11.api(`/api/v11/oploverz/anime-list?${currentFilterParams(page)}`)]); V11.$('#genreSelect').innerHTML+=""+(genres.genres||[]).map(g=>`<option value="${V11.escapeHtml(g.slug)}">${V11.escapeHtml(g.name)}</option>`).join(''); V11.$('#genreSelect').value=qs.get('genres')||qs.get('genre')||''; V11.renderGrid(V11.$('#grid'),data.anime_list||[]); const m=data.meta||{}; const note=data.type_filter_limited?'<span class="pill">Tipe difilter seperti upstream client-side.</span>':''; V11.$('#pager').innerHTML=`${note}${page>1?`<a class="btn secondary" href="/v11/anime-list?${currentFilterParams(page-1)}">← Prev</a>`:''}<span class="pill">${m.current_page||page} / ${m.last_page||1}</span>${(m.last_page||1)>page?`<a class="btn secondary" href="/v11/anime-list?${currentFilterParams(page+1)}">Next →</a>`:''}`;}catch(e){V11.$('#grid').innerHTML=`<div class="error">${V11.escapeHtml(e.message)}</div>`;}})();
</script></body></html>
