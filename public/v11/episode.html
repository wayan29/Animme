<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>V11 Episode</title><link rel="stylesheet" href="/styles.css"><link rel="stylesheet" href="/mobile.css"><link rel="stylesheet" href="/v11/v11.css"></head><body class="server-v11"><div class="home-layout" id="app"></div><script src="/v11/v11.js"></script><script src="/server-select.js"></script><script>
const p=V11.params(); const slug=p.get('slug')||''; const episode=p.get('episode')||''; const episodeId=p.get('id')||'';
app.innerHTML=V11.shell('list')+`<main class="main-content episode-page">${V11.topbar()}<div id="content"><div class="loading" role="status" aria-live="polite">Memuat episode...</div></div></main>`; V11.bindSearch();
function setPlayer(url,label='Streaming player',activeBtn=null){V11.$('#player').innerHTML=`<iframe src="${V11.escapeHtml(url)}" title="${V11.escapeHtml(label)}" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>`; document.querySelectorAll('.stream-btn').forEach(btn=>{const on=btn===activeBtn; btn.classList.toggle('active',on); btn.classList.toggle('secondary',!on); btn.setAttribute('aria-pressed',on?'true':'false');});}
function streamLabel(s,i){return V11.escapeHtml(s.source||s.server||`Server ${i+1}`);}
(async()=>{try{const apiPath=episodeId?`/api/v11/oploverz/episode-id/${V11.enc(episodeId)}`:`/api/v11/oploverz/episode/${V11.enc(slug)}/${V11.enc(episode)}`; const d=await V11.api(apiPath); document.title=`${d.series_title} Episode ${d.episode_num}`; const streams=d.streams||[]; const downloads=d.downloads||[]; const playerEmpty=streams.length?'<div class="player-placeholder"><b>Pilih server</b><span>untuk mulai menonton</span></div>':'<div class="player-placeholder"><b>Server belum tersedia</b><span>Coba episode lain atau cek kembali nanti.</span></div>'; V11.$('#content').innerHTML=`<section class="two-col episode-layout"><div><header class="episode-header"><p class="episode-kicker">Now Playing</p><h1>${V11.escapeHtml(d.series_title)} Episode ${V11.escapeHtml(d.episode_num)}</h1><div class="episode-meta"><span class="pill">Episode ${V11.escapeHtml(d.episode_num)}</span>${d.source?`<span class="pill">${V11.escapeHtml(d.source)}</span>`:''}</div></header><div class="episode-player-card"><div class="player-wrap" id="player">${playerEmpty}</div></div><div class="section episode-stream-section"><div class="section-header"><div><h2 id="streamHeading">Server Streaming</h2><p class="section-subtitle">Pilih server jika video tidak berjalan.</p></div></div><div class="stream-selector" role="group" aria-labelledby="streamHeading">${streams.map((s,i)=>`<button type="button" class="btn stream-btn ${i?'secondary':'active'}" data-url="${V11.escapeHtml(s.url)}" data-label="${streamLabel(s,i)}" aria-pressed="${i?'false':'true'}">${streamLabel(s,i)}</button>`).join('')||'<p class="muted">Tidak ada server streaming.</p>'}</div></div><nav class="episode-actions" aria-label="Navigasi episode">${d.previous_episode?`<a class="btn secondary" href="/v11/episode?slug=${V11.enc(d.series_slug)}&episode=${V11.enc(d.previous_episode)}">← Prev</a>`:''}<a class="btn secondary" href="/v11/detail?slug=${V11.enc(d.series_slug)}">Detail Anime</a>${d.next_episode?`<a class="btn secondary" href="/v11/episode?slug=${V11.enc(d.series_slug)}&episode=${V11.enc(d.next_episode)}">Next →</a>`:''}</nav></div><aside class="panel episode-side" aria-labelledby="downloadHeading"><img class="episode-side-poster" src="${V11.escapeHtml(d.poster||'')}" alt="${V11.escapeHtml(d.series_title||'Poster')}" loading="lazy" decoding="async" onerror="this.style.display='none'"><div class="episode-downloads"><h3 id="downloadHeading">Download</h3>${downloads.map(g=>`<div class="download-group"><strong>${V11.escapeHtml(g.format)} ${V11.escapeHtml(g.quality)}</strong><div class="download-links">${(g.links||[]).map(l=>`<a class="pill download-link" target="_blank" rel="noopener noreferrer" href="${V11.escapeHtml(l.url)}">${V11.escapeHtml(l.host)}</a>`).join('')}</div></div>`).join('')||'<p class="muted download-empty">Tidak ada link download.</p>'}</div></aside></section>`; document.querySelectorAll('.stream-btn').forEach(btn=>btn.addEventListener('click',()=>setPlayer(btn.dataset.url,btn.dataset.label,btn))); const first=document.querySelector('.stream-btn'); if(first) setPlayer(first.dataset.url,first.dataset.label,first);}catch(e){V11.$('#content').innerHTML=`<div class="error" role="alert"><strong>Gagal memuat episode</strong><br>${V11.escapeHtml(e.message)}<br><button class="btn" onclick="location.reload()">Coba lagi</button></div>`;}})();
</script></body></html>
