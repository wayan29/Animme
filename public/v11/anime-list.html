<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>V11 Anime List</title><link rel="stylesheet" href="/styles.css"><link rel="stylesheet" href="/mobile.css"><link rel="stylesheet" href="/v11/v11.css"></head><body class="server-v11"><div class="home-layout" id="app"></div><script src="/v11/v11.js"></script><script src="/server-select.js"></script><script>
const qs=V11.params(); const page=Math.max(1,parseInt(qs.get('page')||'1',10));
function currentFilterParams(nextPage=page){const p=new URLSearchParams(); p.set('page',nextPage); ['hot','mature','censored','season'].forEach(k=>{const v=qs.get(k); if(v) p.set(k,v);}); return p.toString();}
app.innerHTML=V11.shell('list')+`<main class="main-content">${V11.topbar()}<section class="hero"><h1>Anime List</h1><p class="muted">Halaman ${page}</p><div class="pagination"><a class="btn secondary" href="/v11/anime-list?hot=true">🔥 Hot</a><a class="btn secondary" href="/v11/anime-list?mature=false">Safe</a><a class="btn secondary" href="/v11/anime-list?censored=false">Uncensored</a><input id="seasonInput" class="search-input" style="max-width:220px" placeholder="season slug: summer-2025"><button id="seasonBtn" class="btn secondary">Season</button><a class="btn secondary" href="/v11/anime-list">Reset</a></div></section><div class="grid" id="grid"><div class="loading">Memuat...</div></div><div class="pagination" id="pager"></div></main>`; V11.bindSearch(); V11.$('#seasonInput').value=qs.get('season')||''; V11.$('#seasonBtn').addEventListener('click',()=>{const v=V11.$('#seasonInput').value.trim(); if(v) location.href=`/v11/anime-list?season=${V11.enc(v)}`;});
(async()=>{try{const data=await V11.api(`/api/v11/oploverz/anime-list?${currentFilterParams(page)}`); V11.renderGrid(V11.$('#grid'),data.anime_list||[]); const m=data.meta||{}; V11.$('#pager').innerHTML=`${page>1?`<a class="btn secondary" href="/v11/anime-list?${currentFilterParams(page-1)}">← Prev</a>`:''}<span class="pill">${m.current_page||page} / ${m.last_page||1}</span>${(m.last_page||1)>page?`<a class="btn secondary" href="/v11/anime-list?${currentFilterParams(page+1)}">Next →</a>`:''}`;}catch(e){V11.$('#grid').innerHTML=`<div class="error">${V11.escapeHtml(e.message)}</div>`;}})();
</script></body></html>
