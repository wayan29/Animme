<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>V11 Oploverz</title><link rel="stylesheet" href="/styles.css"><link rel="stylesheet" href="/mobile.css"><link rel="stylesheet" href="/v11/v11.css"></head><body class="server-v11"><div class="home-layout" id="app"></div><script src="/v11/v11.js"></script><script src="/server-select.js"></script><script>
app.innerHTML=V11.shell('home')+`<main class="main-content">${V11.topbar()}<section class="hero" id="hero" aria-label="Rekomendasi Oploverz"><div class="hero-feature"><div><span class="pill">Rekomendasi</span><h1>Oploverz Plus</h1><p class="muted">Server V11 dari plus.oploverz.ltd dengan tampilan gaya V3.</p><div class="hero-meta"><span class="pill">Anime Sub Indo</span><span class="pill">Streaming</span><span class="pill">Download</span></div><a class="btn" href="/v11/anime-list">Jelajah Anime</a></div><a class="hero-poster" href="/v11/anime-list"><img src="https://placehold.co/400x600/111/fff?text=Oploverz" alt="Oploverz"></a></div></section><section class="section" aria-label="Anime terbaru"><div class="section-header"><div><h2>Anime Terbaru</h2><p class="section-subtitle">Update episode terbaru dari Oploverz Plus</p></div><a class="btn secondary" href="/v11/anime-list">Lihat semua</a></div><div class="grid" id="latest"><div class="loading">Memuat...</div></div></section><section class="section" aria-label="Sedang trending"><div class="section-header"><div><h2>Sedang Trending</h2><p class="section-subtitle">Pilihan populer dan rekomendasi saat ini</p></div><a class="btn secondary" href="/v11/anime-list?sortBy=releaseDate-desc">Jelajah</a></div><div class="grid" id="popular"><div class="loading">Memuat...</div></div></section></main>`;
V11.bindSearch();
function renderHero(item={}){const slug=item.slug||item.series_slug||item.detail_slug||''; if(!slug)return; const href=item.detail_url||`/v11/detail?slug=${V11.enc(slug)}`; const image=item.banner||item.poster||''; V11.$('#hero').className='hero banner-hero'; V11.$('#hero').innerHTML=`<img class="banner-bg" src="${V11.escapeHtml(image)}" alt="${V11.escapeHtml(item.title||item.series_title||'Banner')}" loading="eager" decoding="async" fetchpriority="high" onerror="this.style.display='none'"><div class="banner-content"><p class="banner-kicker">Tonton Anime Terbaru</p><h1 class="banner-title">${V11.escapeHtml(item.title||item.series_title||'Oploverz Plus')}</h1><p class="muted banner-desc">${V11.escapeHtml((item.description||'Anime pilihan dari Oploverz Plus.').slice(0,260))}</p><div class="hero-meta"><span class="pill">Rekomendasi</span>${item.type?`<span class="pill">${V11.escapeHtml(item.type)}</span>`:''}${item.status?`<span class="pill">${V11.escapeHtml(item.status)}</span>`:''}${item.score?`<span class="pill">⭐ ${V11.escapeHtml(item.score)}</span>`:''}</div><div class="hero-actions"><a class="btn" href="${href}">Mulai Sekarang</a>${item.watch_url?`<a class="btn secondary" href="${item.watch_url}">Tonton Sekarang</a>`:`<a class="btn secondary" href="${href}">Lihat Detail</a>`}</div></div>`;}
(async()=>{try{const data=await V11.api('/api/v11/oploverz/home'); const recommendation=(data.banners&&data.banners.find(b=>/one piece/i.test(b.title)))||(data.banners&&data.banners[0])||(data.popular&&data.popular[0])||(data.series&&data.series[0])||{}; renderHero(recommendation); V11.renderGrid(V11.$('#latest'),data.latest_episodes||data.series||[]); V11.renderGrid(V11.$('#popular'),data.popular&&data.popular.length?data.popular:data.series||[]);}catch(e){V11.$('#latest').innerHTML=`<div class="error">${V11.escapeHtml(e.message)}</div>`; V11.$('#popular').innerHTML='';}})();
</script></body></html>
