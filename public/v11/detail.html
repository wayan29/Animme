<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>V11 Detail</title><link rel="stylesheet" href="/styles.css"><link rel="stylesheet" href="/mobile.css"><link rel="stylesheet" href="/v11/v11.css"></head><body class="server-v11"><div class="home-layout" id="app"></div><script src="/v11/v11.js"></script><script src="/server-select.js"></script><script>
const slug=V11.params().get('slug')||location.pathname.split('/').pop();
app.innerHTML=V11.shell('list')+`<main class="main-content">${V11.topbar()}<div id="content"><div class="loading">Memuat detail...</div></div></main>`; V11.bindSearch();
(async()=>{try{const d=await V11.api(`/api/v11/oploverz/anime/${V11.enc(slug)}`); document.title=`${d.title} - V11`; const eps=d.episodes||[]; V11.$('#content').innerHTML=`<section class="detail-hero"><div class="detail-poster"><img src="${V11.escapeHtml(d.poster||'')}" onerror="this.src='https://placehold.co/400x600/111/fff?text=Oploverz'"></div><div><h1>${V11.escapeHtml(d.title)}</h1><p class="muted">${V11.escapeHtml(d.japanese_title||'')}</p><p>${V11.escapeHtml(d.description||'')}</p><div>${(d.genres||[]).map(g=>`<span class="pill">${V11.escapeHtml(g.name||g)}</span>`).join('')}<span class="pill">${V11.escapeHtml(d.status||'')}</span><span class="pill">${V11.escapeHtml(d.type||'')}</span>${d.score?`<span class="pill">⭐ ${V11.escapeHtml(d.score)}</span>`:''}</div>${eps.length?`<p><a class="btn" href="/v11/episode?slug=${V11.enc(d.slug)}&episode=${V11.enc(eps[eps.length-1].episode_num)}">Tonton Episode ${V11.escapeHtml(eps[eps.length-1].episode_num)}</a></p>`:''}</div></section><section class="section"><div class="section-header"><h2>Episode (${eps.length})</h2></div><div class="episode-grid">${eps.map(e=>`<a class="episode-btn" href="/v11/episode?slug=${V11.enc(d.slug)}&episode=${V11.enc(e.episode_num)}">${V11.escapeHtml(e.episode_num)}</a>`).join('')}</div></section>`;}catch(e){V11.$('#content').innerHTML=`<div class="error">${V11.escapeHtml(e.message)}</div>`;}})();
</script></body></html>
