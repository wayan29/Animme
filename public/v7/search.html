<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimMe V7 - Search</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/mobile.css">
    <style>
        .server-v7 {
            --primary-color: #e74c3c;
            --secondary-color: #c0392b;
            --accent-color: #f39c12;
        }

        .server-v7 .sidebar {
            background: linear-gradient(180deg, #1a0a0f 0%, #2d1520 100%);
        }

        .server-v7 .nav-link.active,
        .server-v7 .nav-link:hover {
            background: rgba(231, 76, 60, 0.15);
            border-left-color: var(--primary-color);
        }

        .server-v7 .topbar {
            background: linear-gradient(135deg, #1a0a0f 0%, #2d1520 100%);
            border-bottom: 1px solid rgba(231, 76, 60, 0.3);
        }

        .search-hero {
            position: relative;
            overflow: hidden;
            margin-bottom: 24px;
            padding: clamp(22px, 4vw, 34px);
            border: 1px solid rgba(231, 76, 60, 0.22);
            border-radius: 22px;
            background:
                radial-gradient(circle at 85% 10%, rgba(243, 156, 18, 0.16), transparent 28%),
                linear-gradient(135deg, rgba(45, 21, 32, 0.96), rgba(18, 10, 15, 0.96));
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.32);
        }

        .search-hero::after {
            content: 'SEARCH';
            position: absolute;
            right: 18px;
            bottom: -8px;
            color: rgba(255, 255, 255, 0.035);
            font-size: clamp(3rem, 9vw, 7rem);
            font-weight: 900;
            letter-spacing: .08em;
            pointer-events: none;
        }

        .search-kicker {
            display: inline-flex;
            width: fit-content;
            margin-bottom: 10px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(243, 156, 18, 0.35);
            background: rgba(243, 156, 18, 0.12);
            color: #ffd89a;
            font-size: .78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        .search-title {
            position: relative;
            z-index: 1;
            margin: 0 0 8px;
            color: #ffe8e8;
            font-size: clamp(1.7rem, 3.5vw, 3rem);
            line-height: 1.05;
        }

        .search-subtitle {
            position: relative;
            z-index: 1;
            margin: 0;
            color: rgba(255, 232, 232, 0.72);
            max-width: 720px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 18px;
            min-width: 0;
        }

        .result-card {
            overflow: hidden;
            min-width: 0;
            border-radius: 16px;
            border: 1px solid rgba(231, 76, 60, 0.18);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.02)), rgba(26, 10, 15, 0.92);
            color: inherit;
            text-decoration: none;
            transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
        }

        .result-card:hover,
        .result-card:focus-visible {
            transform: translateY(-5px);
            border-color: rgba(231, 76, 60, 0.55);
            box-shadow: 0 14px 30px rgba(45, 21, 32, 0.62);
            outline: none;
        }

        .result-poster {
            position: relative;
            aspect-ratio: 16 / 10;
            background: #0b0b0f center / cover no-repeat;
        }

        .result-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(231, 76, 60, 0.9);
            color: #fff;
            font-size: .72rem;
            font-weight: 800;
        }

        .result-info {
            padding: 13px;
        }

        .result-title {
            color: #ffe8e8;
            font-size: .96rem;
            font-weight: 800;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            overflow-wrap: anywhere;
            min-height: 2.6em;
        }

        .result-desc {
            margin-top: 8px;
            color: rgba(255, 232, 232, .62);
            font-size: .82rem;
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .search-empty,
        .search-loading,
        .search-error {
            text-align: center;
            padding: 46px 18px;
            border-radius: 18px;
            background: rgba(26, 10, 15, 0.82);
            border: 1px solid rgba(231, 76, 60, 0.18);
            color: rgba(255, 232, 232, 0.76);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 26px;
        }

        .pagination button {
            border: 1px solid rgba(231, 76, 60, 0.35);
            border-radius: 999px;
            background: rgba(231, 76, 60, 0.16);
            color: #ffe8e8;
            padding: 10px 16px;
            cursor: pointer;
            font-weight: 800;
        }

        .pagination button:disabled {
            opacity: .45;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .home-layout .main-content {
                padding: 0 14px 60px;
            }

            .result-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
            }

            .result-info {
                padding: 10px;
            }

            .result-title {
                font-size: .82rem;
            }

            .result-desc {
                font-size: .74rem;
                -webkit-line-clamp: 2;
            }
        }

        @media (max-width: 340px) {
            .result-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="server-v7 home-with-sidebar">
    <div class="home-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="logo" onclick="window.location.href='/v7/home'">AnimMe V7</h1>
                <button class="sidebar-close" id="menuCloseBtn" aria-label="Tutup menu">×</button>
            </div>
            <div class="sidebar-server">
                <span class="server-label">Pilih Server</span>
                <div class="server-select-wrapper">
                    <select id="serverSelect" class="server-select">
                        <option value="v1">V1 - Otakudesu</option>
                        <option value="v2">V2 - Samehadaku</option>
                        <option value="v3">V3 - Kuramanime</option>
                        <option value="v4">V4 - Anichin</option>
                        <option value="v5">V5 - Anoboy</option>
                        <option value="v6">V6 - AnimeIndo</option>
                        <option value="v7" selected>V7 - Nekopoi</option>
                        <option value="v8">V8 - Kusonime</option>
                        <option value="v9">V9 - Auratail</option>
                        <option value="v10">V10 - Vidku</option>
                    </select>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a href="/v7/home" class="nav-link">🏠 Beranda</a>
                <a href="/v7/search" class="nav-link active">🔎 Search</a>
                <a href="/v7/list" class="nav-link">📚 Hentai List</a>
            </nav>
        </aside>

        <div class="content-area">
            <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

            <header class="topbar">
                <button class="menu-toggle" id="menuToggle" aria-label="Buka menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <div class="topbar-title" onclick="window.location.href='/v7/home'">AnimMe V7 - Search</div>
                <div class="search-container">
                    <button class="search-icon-mobile" id="searchIconBtn" aria-label="Search">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </button>
                    <input type="text" id="searchInput" placeholder="Cari di Nekopoi..." class="search-input">
                    <button id="searchBtn" class="search-btn">Cari</button>
                    <button class="search-close-btn" id="searchCloseBtn" aria-label="Close">×</button>
                </div>
            </header>

            <main class="main-content">
                <div class="search-hero">
                    <span class="search-kicker">V7 · Nekopoi Search</span>
                    <h1 class="search-title" id="searchTitle">Search Nekopoi</h1>
                    <p class="search-subtitle" id="searchSubtitle">Masukkan kata kunci untuk mencari episode dan update Nekopoi.</p>
                </div>

                <div id="searchContent" class="search-loading">Memuat hasil pencarian...</div>

                <div class="pagination" id="paginationControls" style="display:none;">
                    <button id="prevPageBtn">← Sebelumnya</button>
                    <span id="pageInfo" style="color:#ffe8e8;font-weight:800;"></span>
                    <button id="nextPageBtn">Selanjutnya →</button>
                </div>
            </main>

            <footer class="footer">
                <p>AnimMe V7 - Powered by Nekopoi</p>
            </footer>
        </div>
    </div>

    <script src="/v7/search.js"></script>
    <script src="/shared/server-select.js"></script>
</body>
</html>
