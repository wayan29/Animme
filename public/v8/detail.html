<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Anime - Kusonime V8</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/mobile.css">
    <style>
        .server-v8-detail {
            --primary-color: #f59e0b;
            --secondary-color: #d97706;
            --surface-color: rgba(30, 24, 18, 0.92);
            --surface-border: rgba(245, 158, 11, 0.18);
            --text-muted: rgba(255, 237, 213, 0.72);
            min-height: 100vh;
            overflow-x: clip;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(circle at top, rgba(245, 158, 11, 0.16), transparent 28%),
                linear-gradient(180deg, #120d08 0%, #18110a 35%, #0c0906 100%);
        }

        .server-v8-detail .navbar {
            padding: 16px 0;
            background: rgba(10, 7, 4, 0.94);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(245, 158, 11, 0.12);
        }

        .server-v8-detail .nav-container {
            gap: 18px;
            flex-wrap: wrap;
        }

        .server-v8-detail .nav-logo {
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-decoration: none;
            color: #fff7ed;
            min-width: 180px;
        }

        .server-v8-detail .nav-logo span:first-child {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, #fff7ed 0%, #fbbf24 55%, #f59e0b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .server-v8-detail .version-tag {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(245, 158, 11, 0.16);
            color: #fbbf24;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .server-v8-detail .nav-search {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: min(100%, 320px);
        }

        .server-v8-detail .nav-search input {
            flex: 1;
            min-width: 0;
            border: 1px solid rgba(245, 158, 11, 0.18);
            background: rgba(21, 15, 10, 0.96);
            color: #fff7ed;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 0.95rem;
        }

        .server-v8-detail .nav-search input:focus {
            outline: none;
            border-color: rgba(245, 158, 11, 0.6);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.14);
        }

        .server-v8-detail .nav-search button,
        .server-v8-detail .nav-links a,
        .server-v8-detail .back-button,
        .server-v8-detail .status-retry {
            border: none;
            border-radius: 12px;
            font-weight: 700;
            transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease, filter 0.2s ease;
        }

        .server-v8-detail .nav-search button,
        .server-v8-detail .back-button {
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: #1c1208;
            cursor: pointer;
        }

        .server-v8-detail .nav-links {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .server-v8-detail .nav-links a {
            text-decoration: none;
            color: #fff7ed;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.04);
        }

        .server-v8-detail .nav-links a:hover,
        .server-v8-detail .nav-search button:hover,
        .server-v8-detail .back-button:hover {
            transform: translateY(-1px);
            background: rgba(245, 158, 11, 0.18);
            color: #fbbf24;
        }

        .server-v8-detail .nav-search button:hover {
            background: linear-gradient(135deg, #fbbf24, var(--secondary-color));
            color: #1c1208;
        }

        .server-v8-detail .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 120px 4% 60px;
            min-width: 0;
        }

        .server-v8-detail .detail-shell,
        .server-v8-detail .download-section,
        .server-v8-detail footer.v8-footer {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 22px;
            box-shadow: 0 18px 38px rgba(0, 0, 0, 0.28);
            min-width: 0;
        }

        .server-v8-detail .back-button {
            margin-bottom: 20px;
        }

        .server-v8-detail .detail-shell {
            padding: 28px;
            position: relative;
            overflow: hidden;
        }

        .server-v8-detail .detail-shell.is-loaded::before {
            content: '';
            position: absolute;
            inset: 0 auto 0 0;
            width: 4px;
            border-radius: 22px 0 0 22px;
            background: linear-gradient(180deg, #fbbf24, var(--secondary-color));
            pointer-events: none;
        }

        .server-v8-detail .detail-header {
            display: grid;
            grid-template-columns: minmax(220px, 300px) minmax(0, 1fr) !important;
            gap: 28px;
            align-items: start;
        }

        .server-v8-detail .detail-poster-wrap {
            position: relative;
            min-width: 0;
        }

        .server-v8-detail .detail-poster-wrap::after {
            content: '';
            position: absolute;
            inset: 12px;
            border-radius: 18px;
            box-shadow: inset 0 0 0 1px rgba(245, 158, 11, 0.22);
            pointer-events: none;
        }

        .server-v8-detail .detail-poster {
            width: 100%;
            max-width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            border-radius: 18px;
            display: block;
            background: #120d08;
            border: 1px solid rgba(245, 158, 11, 0.12);
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.35);
        }

        .server-v8-detail .detail-info {
            min-width: 0;
        }

        .server-v8-detail .detail-kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(245, 158, 11, 0.12);
            border: 1px solid rgba(245, 158, 11, 0.22);
            color: #fde68a;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .server-v8-detail .detail-title {
            font-size: clamp(1.65rem, 4vw, 2.8rem);
            line-height: 1.08;
            color: #fff7ed;
            margin: 0 0 10px;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .server-v8-detail .detail-subtitle {
            color: var(--text-muted);
            margin: 0 0 18px;
            font-size: 1rem;
            overflow-wrap: anywhere;
        }

        .server-v8-detail .genre-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 18px 0 20px;
        }

        .server-v8-detail .genre-tag {
            display: inline-flex;
            max-width: 100%;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(245, 158, 11, 0.1);
            color: #fde68a;
            font-size: 0.8rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .server-v8-detail .detail-meta {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .server-v8-detail .meta-item {
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #fff7ed;
            min-width: 0;
        }

        .server-v8-detail .meta-value {
            display: block;
            overflow-wrap: anywhere;
            word-break: break-word;
            line-height: 1.45;
        }

        .server-v8-detail .meta-label {
            display: block;
            font-size: 0.76rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .server-v8-detail .section-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .server-v8-detail .section-title {
            margin: 0;
            font-size: 1.35rem;
            color: #fff7ed;
        }

        .server-v8-detail .section-title::after {
            content: '';
            display: block;
            width: 48px;
            height: 3px;
            margin-top: 10px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--primary-color), transparent);
        }

        .server-v8-detail .section-badge {
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(245, 158, 11, 0.16);
            color: #fbbf24;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .server-v8-detail .detail-synopsis {
            margin-top: 24px;
            padding-top: 22px;
            border-top: 1px solid rgba(245, 158, 11, 0.12);
        }

        .server-v8-detail .detail-synopsis h3 {
            color: #fff7ed;
            margin: 0 0 12px;
            font-size: 1.15rem;
        }

        .server-v8-detail .detail-synopsis p {
            color: var(--text-muted);
            line-height: 1.8;
            margin: 0 0 14px;
            overflow-wrap: anywhere;
        }

        .server-v8-detail .download-section {
            margin-top: 24px;
            padding: 24px 28px;
        }

        .server-v8-detail .download-section h2 {
            margin: 0;
        }

        .server-v8-detail .download-quality {
            margin: 18px 0 0;
            padding: 18px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border-left: 3px solid var(--primary-color);
            min-width: 0;
        }

        .server-v8-detail .download-quality h3 {
            color: #fbbf24;
            margin: 0 0 12px;
            font-size: 1rem;
            overflow-wrap: anywhere;
        }

        .server-v8-detail .download-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .server-v8-detail .download-btn {
            padding: 9px 14px;
            background: rgba(245, 158, 11, 0.14);
            color: #fff7ed;
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.9rem;
            border: 1px solid rgba(245, 158, 11, 0.12);
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
        }

        .server-v8-detail .download-btn:hover {
            transform: translateY(-1px);
            background: rgba(245, 158, 11, 0.24);
            color: #fbbf24;
        }

        .server-v8-detail .detail-shell--loading {
            padding: 0;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .server-v8-detail .detail-shell--loading::before {
            display: none;
        }

        .server-v8-detail .status-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 32px 20px;
            text-align: center;
            border-radius: 18px;
            max-width: 100%;
        }

        .server-v8-detail .status-panel--loading {
            background: rgba(255, 255, 255, 0.04);
            border: 1px dashed rgba(245, 158, 11, 0.22);
            color: var(--text-muted);
        }

        .server-v8-detail .status-panel--error {
            background: rgba(185, 28, 28, 0.18);
            color: #fecaca;
            border: 1px solid rgba(248, 113, 113, 0.28);
        }

        .server-v8-detail .status-panel--empty {
            background: rgba(245, 158, 11, 0.08);
            color: #fde68a;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .server-v8-detail .status-icon {
            font-size: 1.75rem;
            line-height: 1;
        }

        .server-v8-detail .status-message {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.5;
            max-width: 36ch;
        }

        .server-v8-detail .status-retry {
            margin-top: 4px;
            padding: 10px 18px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: #1c1208;
        }

        .server-v8-detail .status-retry:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .server-v8-detail .v8-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(245, 158, 11, 0.2);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: v8DetailSpin 0.85s linear infinite;
        }

        @keyframes v8DetailSpin {
            to { transform: rotate(360deg); }
        }

        .server-v8-detail .detail-skeleton {
            display: grid;
            grid-template-columns: minmax(200px, 280px) minmax(0, 1fr);
            gap: 28px;
            padding: 28px;
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 22px;
        }

        .server-v8-detail .sk-poster,
        .server-v8-detail .sk-line {
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 18px;
        }

        .server-v8-detail .sk-poster {
            aspect-ratio: 3 / 4;
        }

        .server-v8-detail .sk-line {
            height: 14px;
            border-radius: 999px;
            margin-bottom: 12px;
        }

        .server-v8-detail .sk-line.title { height: 28px; width: 85%; }
        .server-v8-detail .sk-line.sub { width: 55%; }
        .server-v8-detail .sk-line.wide { width: 100%; }

        .server-v8-detail .sk-poster::after,
        .server-v8-detail .sk-line::after {
            content: '';
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.14), transparent);
            animation: v8DetailSkeleton 1.25s infinite;
        }

        @keyframes v8DetailSkeleton {
            100% { transform: translateX(100%); }
        }

        .server-v8-detail footer.v8-footer {
            margin: 0 4% 40px;
            padding: 24px;
            color: var(--text-muted);
            text-align: center;
        }

        .server-v8-detail footer.v8-footer strong {
            color: #fbbf24;
        }

        .server-v8-detail footer.v8-footer .v8-footer-muted {
            margin-top: 10px;
            opacity: 0.7;
            font-size: 0.88rem;
        }

        @media (max-width: 900px) {
            .server-v8-detail .detail-header,
            .server-v8-detail .detail-skeleton {
                grid-template-columns: 1fr !important;
            }

            .server-v8-detail .detail-poster-wrap {
                max-width: 320px;
                margin: 0 auto;
                width: 100%;
            }
        }

        @media (max-width: 768px) {
            .server-v8-detail .container {
                padding-top: 150px;
            }

            .server-v8-detail .navbar {
                padding: 10px 0;
            }

            .server-v8-detail .nav-logo span:first-child {
                font-size: 1.35rem;
            }

            .server-v8-detail .nav-search,
            .server-v8-detail .nav-links {
                width: 100%;
            }

            .server-v8-detail .nav-links a {
                flex: 1;
                text-align: center;
                min-width: 0;
            }

            .server-v8-detail .detail-shell,
            .server-v8-detail .download-section,
            .server-v8-detail footer.v8-footer {
                padding: 20px;
                border-radius: 18px;
            }

            .server-v8-detail .detail-meta {
                grid-template-columns: 1fr;
            }

        }
    </style>
</head>
<body class="server-v8-detail">
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span>AnimMe</span>
                <span class="version-tag">V8 - Kusonime</span>
            </a>

            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="Cari anime..." aria-label="Cari anime">
                <button type="button" id="searchButton" aria-label="Cari">🔍</button>
            </div>

            <div class="nav-links">
                <a href="/v8/home">Home</a>
                <a href="/v8/anime-list">Anime List</a>
                <a href="/v8/genres">Genres</a>
                <a href="/v8/years">Tahun Rilis</a>
                <a href="/">Ver. Lain</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <button type="button" onclick="history.back()" class="back-button">← Kembali</button>

        <div id="detailContent" class="detail-shell detail-shell--loading" aria-busy="true" aria-live="polite"></div>
    </div>

    <footer class="v8-footer">
        <p><strong>Kusonime - Batch Download</strong></p>
        <p>Download anime batch dengan subtitle Indonesia</p>
        <p class="v8-footer-muted">Powered by AnimMe API</p>
    </footer>

    <script src="/v8/detail.js"></script>
</body>
</html>
