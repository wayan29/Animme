<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimMe V4 - Completed Series</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/mobile.css">
    <style>
        /* V4 completed — scoped visual polish aligned with refreshed Anichin home */
        .v4-completed-page {
            --v4-bg: #0f1019;
            --v4-panel: #1a1a2e;
            --v4-card: #16213e;
            --v4-border: rgba(255, 107, 107, 0.12);
            --v4-border-strong: rgba(255, 107, 107, 0.28);
            --v4-muted: rgba(255, 255, 255, 0.62);
            --v4-primary: #ff6b6b;
            --v4-primary-soft: rgba(255, 107, 107, 0.14);
            --v4-accent: #ffd700;
            --v4-shadow: 0 14px 40px rgba(8, 10, 24, 0.45);
            --v4-radius: 14px;
        }

        .v4-completed-page.server-v4 {
            --primary-color: #ff6b6b;
            --secondary-color: #ee5a6f;
            --accent-color: #ffd700;
        }

        .v4-completed-page.home-with-sidebar .content-area {
            background:
                radial-gradient(circle at 6% 0%, rgba(255, 107, 107, 0.14) 0%, transparent 40%),
                radial-gradient(circle at 94% 6%, rgba(238, 90, 111, 0.08) 0%, transparent 36%),
                var(--v4-bg);
        }

        .server-v4 .sidebar {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
        }

        .v4-completed-page .sidebar {
            border-right-color: var(--v4-border);
        }

        .v4-completed-page .sidebar .logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, rgba(255, 107, 107, 0.85) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .server-v4 .nav-link.active,
        .server-v4 .nav-link:hover {
            background: rgba(255, 107, 107, 0.12);
            border-left-color: var(--primary-color);
        }

        .server-v4 .topbar {
            background: linear-gradient(180deg, rgba(15, 16, 25, 0.96) 0%, rgba(15, 16, 25, 0.86) 100%);
            border-bottom: 1px solid rgba(255, 107, 107, 0.2);
        }

        .v4-completed-page .topbar-title {
            color: #fff;
            font-weight: 600;
        }

        .v4-completed-page .topbar .search-input {
            background: rgba(12, 14, 28, 0.9);
            border: 1px solid var(--v4-border);
            border-radius: 999px;
            padding: 10px 18px;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .v4-completed-page .topbar .search-input:focus {
            outline: none;
            border-color: rgba(255, 107, 107, 0.55);
            box-shadow: 0 0 0 3px var(--v4-primary-soft);
        }

        .v4-completed-page .topbar .search-btn {
            border-radius: 999px;
            padding: 10px 20px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--v4-primary) 0%, var(--secondary-color) 100%);
            border: none;
            color: #fff;
        }

        .server-v4 .main-content {
            padding-bottom: 80px;
        }

        .server-v4 .page-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
            padding: 22px;
            border: 1px solid var(--v4-border);
            border-radius: var(--v4-radius);
            background: linear-gradient(160deg, rgba(26, 26, 46, 0.72) 0%, rgba(22, 33, 62, 0.56) 100%);
            box-shadow: var(--v4-shadow);
            flex-wrap: wrap;
        }

        .server-v4 .page-title h2 {
            font-size: 1.75rem;
            margin: 0;
            color: #fff;
        }

        .server-v4 .page-title p {
            color: rgba(255,255,255,0.65);
            margin: 0;
            font-size: 0.95rem;
        }

        .server-v4 .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 18px;
        }

        .server-v4 .anime-card {
            display: flex;
            flex-direction: column;
            border-radius: 14px;
            overflow: hidden;
            background: linear-gradient(160deg, rgba(26, 26, 46, 0.85) 0%, rgba(22, 33, 62, 0.9) 100%);
            border: 1px solid var(--v4-border);
            box-shadow: 0 10px 24px rgba(10, 14, 35, 0.35);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            text-decoration: none;
            color: inherit;
        }

        .server-v4 .anime-card:hover {
            transform: translateY(-6px);
            border-color: var(--v4-border-strong);
            box-shadow: 0 16px 32px rgba(255, 107, 107, 0.28);
        }

        .server-v4 .anime-poster {
            width: 100%;
            aspect-ratio: 3 / 4.4;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.35s ease;
        }

        .server-v4 .anime-card:hover .anime-poster {
            transform: scale(1.035);
        }

        .server-v4 .anime-poster::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 60%);
        }

        .server-v4 .anime-info {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .server-v4 .anime-title {
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .server-v4 .anime-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.65);
        }

        .server-v4 .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255, 215, 0, 0.12);
            border: 1px solid rgba(255, 215, 0, 0.24);
            color: var(--accent-color);
        }

        .server-v4 .sub-badge {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.75);
        }

        .server-v4 .pagination-controls {
            margin-top: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .server-v4 .page-btn {
            padding: 10px 18px;
            border-radius: 999px;
            border: none;
            font-weight: 600;
            background: rgba(255, 107, 107, 0.14);
            border: 1px solid var(--v4-border);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .server-v4 .page-btn:hover:not(:disabled) {
            background: rgba(255, 107, 107, 0.28);
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(255, 107, 107, 0.35);
        }

        .server-v4 .page-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .server-v4 .page-info {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .server-v4 .loading {
            text-align: center;
            padding: 2.5rem 1.25rem;
            grid-column: 1 / -1;
            border-radius: var(--v4-radius);
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--v4-border);
            color: rgba(255,255,255,0.55);
            font-size: 0.95rem;
        }

        .server-v4 .error {
            margin: 18px 0;
            padding: 14px;
            border-radius: 10px;
            grid-column: 1 / -1;
            background: rgba(255, 80, 80, 0.14);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ffbcbc;
            font-weight: 600;
        }

        .v4-completed-page.home-with-sidebar .sidebar .nav-link {
            border-left: 3px solid transparent;
        }

        .v4-completed-page.home-with-sidebar .sidebar .nav-link:hover,
        .v4-completed-page.home-with-sidebar .sidebar .nav-link.active {
            background: var(--v4-primary-soft);
            border-left-color: var(--v4-primary);
            color: #fff;
        }

        .v4-completed-page.home-with-sidebar .sidebar .nav-link.active {
            font-weight: 600;
        }

        .v4-completed-page.home-with-sidebar .topbar.scrolled {
            background: rgba(15, 16, 25, 0.97);
            border-bottom-color: var(--v4-border-strong);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }

        .v4-completed-page .topbar .search-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.35);
        }

        .v4-completed-page .main-content {
            width: 100%;
            max-width: 1320px;
            padding-top: 28px;
        }

        .v4-completed-page .page-title h2::after {
            content: '';
            display: block;
            width: 48px;
            height: 3px;
            margin-top: 10px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--v4-primary), transparent);
        }

        .v4-completed-page .page-title .section-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--v4-accent);
            background: rgba(255, 215, 0, 0.12);
            border: 1px solid rgba(255, 215, 0, 0.28);
        }

        .v4-completed-page .anime-grid {
            grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)) !important;
            gap: 16px;
        }

        .v4-completed-page .anime-card:focus-visible {
            outline: 2px solid rgba(255, 107, 107, 0.65);
            outline-offset: 3px;
        }

        .v4-completed-page .pagination-controls {
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        @keyframes v4-completed-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .v4-completed-page .loading {
            position: relative;
            overflow: hidden;
            color: var(--v4-muted);
        }

        .v4-completed-page .loading::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 107, 0.06), transparent);
            background-size: 200% 100%;
            animation: v4-completed-shimmer 1.6s ease-in-out infinite;
            pointer-events: none;
        }

        .v4-completed-page .footer {
            background: rgba(0, 0, 0, 0.35);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--v4-muted);
            font-size: 0.88rem;
        }

        .server-v4 .badge {
            background: var(--v4-primary-soft);
            border: 1px solid rgba(255, 107, 107, 0.25);
            color: #ffc9c9;
        }

        @media (max-width: 900px) {
            .v4-completed-page .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)) !important;
                gap: 14px;
            }
        }

        @media (max-width: 768px) {
            .server-v4 .main-content {
                padding: 0 20px 70px;
            }

            .server-v4 .page-title {
                gap: 12px;
                margin-bottom: 20px;
            }

            .server-v4 .page-title h2 {
                font-size: 1.5rem;
            }

            .server-v4 .page-title p {
                font-size: 0.85rem;
            }

            .v4-completed-page .anime-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
                gap: 12px;
            }

            .server-v4 .anime-card {
                border-radius: 12px;
            }

            .server-v4 .anime-info {
                padding: 14px;
            }

            .server-v4 .anime-title {
                font-size: 0.92rem;
            }

            .server-v4 .page-btn {
                flex: 1 1 auto;
                min-width: 120px;
            }
        }

        @media (max-width: 540px) {
            .server-v4 .main-content {
                padding: 0 18px 60px;
            }

            .v4-completed-page .anime-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
                gap: 10px;
            }

            .server-v4 .anime-info {
                padding: 12px;
                gap: 6px;
            }

            .server-v4 .anime-meta {
                flex-direction: column;
                align-items: flex-start;
            }
        }

    </style>
</head>
<body class="server-v4 v4-completed-page home-with-sidebar">
    <div class="home-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="logo" onclick="window.location.href='/v4/home'">AnimMe V4</h1>
                <button class="sidebar-close" id="menuCloseBtn" aria-label="Tutup menu">×</button>
            </div>
            <div class="sidebar-server">
                <span class="server-label">Pilih Server</span>
                <div class="server-select-wrapper">
                    <select id="serverSelect" class="server-select">
                        <option value="v1">V1 - Otakudesu</option>
                        <option value="v2">V2 - Samehadaku</option>
                        <option value="v3">V3 - Kuramanime</option>
                        <option value="v4" selected>V4 - Anichin</option>
                        <option value="v5">V5 - Anoboy</option>
                        <option value="v6">V6 - AnimeIndo</option>
                        <option value="v7">V7 - Nekopoi</option>
                        <option value="v8">V8 - Kusonime</option>
                        <option value="v9">V9 - Auratail</option>
                        <option value="v10">V10 - Vidku</option>
                    </select>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a href="/v4/home" class="nav-link">🏠 Beranda</a>
                <a href="/v4/completed" class="nav-link active">✅ Selesai Tayang</a>
            </nav>
        </aside>

        <div class="content-area">
            <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

            <header class="topbar" id="v4Topbar">
                <button class="menu-toggle" id="menuToggle" aria-label="Buka menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <div class="topbar-title" onclick="window.location.href='/v4/home'">AnimMe V4</div>
                <div class="search-container">
                    <button class="search-icon-mobile" id="searchIconBtn" aria-label="Cari anime">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </button>
                    <input type="search" id="searchInput" autocomplete="off" enterkeyhint="search" placeholder="Cari anime..." class="search-input">
                    <button type="button" onclick="searchAnime()" class="search-btn">Cari</button>
                    <button class="search-close-btn" id="searchCloseBtn" aria-label="Tutup pencarian">×</button>
                </div>
            </header>

            <main class="main-content" aria-labelledby="completed-heading">
                <div id="errorContainer" style="display: none;"></div>

                <div class="page-title">
                    <div>
                        <h2 id="completed-heading">✅ Selesai Tayang</h2>
                        <p>Semua seri dan film yang sudah selesai tayang dari Anichin.</p>
                    </div>
                    <span class="section-badge" id="totalBadge" aria-label="Jumlah di halaman ini">0 Judul</span>
                </div>

                <div id="completedList" class="anime-grid">
                    <div class="loading" role="status">Memuat daftar completed…</div>
                </div>

                <div class="pagination-controls">
                    <button id="paginationPrev" class="page-btn" disabled>← Sebelumnya</button>
                    <span id="pageInfo" class="page-info">Halaman 1</span>
                    <button id="paginationNext" class="page-btn" disabled>Berikutnya →</button>
                </div>
            </main>

            <footer class="footer">
                <p>AnimMe V4 — Powered by Anichin</p>
            </footer>
        </div>
    </div>

    <script src="/v4/completed.js?v=20251031"></script>
    <script src="/shared/server-select.js"></script>

    <script>
        (function () {
            var topbar = document.getElementById('v4Topbar');
            if (topbar) {
                window.addEventListener('scroll', function () {
                    topbar.classList.toggle('scrolled', window.scrollY > 24);
                }, { passive: true });
            }
        })();
    </script>
</body>
</html>
