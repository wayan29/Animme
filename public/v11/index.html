<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>V11 Oploverz</title><link rel="stylesheet" href="/styles.css"><link rel="stylesheet" href="/mobile.css"><link rel="stylesheet" href="/v11/v11.css"></head><body class="server-v11"><div class="home-layout" id="app"></div><script src="/v11/v11.js"></script><script src="/server-select.js"></script><script>
app.innerHTML=V11.shell('home')+`<main class="main-content">${V11.topbar()}<section class="hero"><h1>Oploverz Plus</h1><p class="muted">Server V11 dari plus.oploverz.ltd dengan tampilan gaya V3.</p><a class="btn" href="/v11/anime-list">Jelajah Anime</a></section><section class="section"><div class="section-header"><h2>Anime Terbaru</h2><a class="btn secondary" href="/v11/anime-list">Lihat semua</a></div><div class="grid" id="latest"><div class="loading">Memuat...</div></div></section><section class="section"><div class="section-header"><h2>Populer / Hot</h2></div><div class="grid" id="popular"><div class="loading">Memuat...</div></div></section></main>`;
V11.bindSearch();
(async()=>{try{const data=await V11.api('/api/v11/oploverz/home'); V11.renderGrid(V11.$('#latest'),data.latest_episodes||data.series||[]); V11.renderGrid(V11.$('#popular'),data.popular||[]);}catch(e){V11.$('#latest').innerHTML=`<div class="error">${V11.escapeHtml(e.message)}</div>`; V11.$('#popular').innerHTML='';}})();
</script></body></html>
