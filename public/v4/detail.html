<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimMe V4 - Detail Anime</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/mobile.css">
    <link rel="stylesheet" href="/v4/detail-page.css">
</head>
<body class="server-v4 v4-detail-page home-with-sidebar">
    <div class="home-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="logo" onclick="window.location.href='/v4/home'">AnimMe V4</h1>
                <button class="sidebar-close" id="menuCloseBtn" aria-label="Tutup menu">×</button>
            </div>
            <div class="sidebar-server">
                <span class="server-label">Pilih Server</span>
                <div class="server-select-wrapper">
                    <select id="serverSelect" class="server-select">
                        <option value="v1">V1 - Otakudesu</option>
                        <option value="v2">V2 - Samehadaku</option>
                        <option value="v3">V3 - Kuramanime</option>
                        <option value="v4" selected>V4 - Anichin</option>
                        <option value="v5">V5 - Anoboy</option>
                        <option value="v6">V6 - AnimeIndo</option>
                        <option value="v7">V7 - Nekopoi</option>
                        <option value="v8">V8 - Kusonime</option>
                        <option value="v9">V9 - Auratail</option>
                        <option value="v10">V10 - Vidku</option>
                    </select>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a href="/v4/home" class="nav-link">🏠 Beranda</a>
                <a href="/v4/completed" class="nav-link">✅ Selesai Tayang</a>
            </nav>
        </aside>

        <div class="content-area">
            <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

            <header class="topbar" id="v4Topbar">
                <button class="menu-toggle" id="menuToggle" aria-label="Buka menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <div class="topbar-title" onclick="window.location.href='/v4/home'">Detail Anime</div>
                <div class="search-container">
                    <button class="search-icon-mobile" id="searchIconBtn" aria-label="Cari anime">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </button>
                    <input type="search" id="searchInput" autocomplete="off" enterkeyhint="search" placeholder="Cari anime..." class="search-input">
                    <button type="button" onclick="searchAnime()" class="search-btn">Cari</button>
                    <button class="search-close-btn" id="searchCloseBtn" aria-label="Tutup pencarian">×</button>
                </div>
            </header>

            <main class="main-content">
                <div id="errorContainer" style="display: none;" role="alert"></div>

                <div id="loadingContainer" class="detail-state-panel" role="status" aria-live="polite">
                    <div class="loading-spinner" aria-hidden="true"></div>
                    <p>Memuat detail anime…</p>
                </div>

                <div id="detailContainer" style="display: none;"></div>
            </main>

            <footer class="footer">
                <p>AnimMe V4 — Powered by Anichin</p>
            </footer>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v4/anichin';

        document.addEventListener('DOMContentLoaded', () => {
            initSidebarToggle();
            initMobileSearch();

            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');

            if (!slug) {
                showError('Slug anime tidak ditemukan');
                return;
            }

            loadAnimeDetail(slug);
        });

        async function loadAnimeDetail(slug) {
            try {
                const response = await fetch(`${API_BASE}/detail/${encodeURIComponent(slug)}`);
                const data = await response.json();

                if (data.status === 'success' && data.data) {
                    renderDetail(data.data);
                } else {
                    showError('Gagal memuat detail anime');
                }
            } catch (error) {
                console.error('Error loading anime detail:', error);
                showError('Terjadi kesalahan saat memuat data');
            }
        }

        function renderDetail(anime) {
            document.getElementById('loadingContainer').style.display = 'none';
            const container = document.getElementById('detailContainer');
            container.style.display = 'block';

            if (anime.title) {
                document.title = `${anime.title} — AnimMe V4`;
            }

            const poster = anime.poster || '/images/placeholder.jpg';
            const titleSafe = escapeHtml(anime.title || 'Detail');
            const bcTitle = escapeHtml(truncateText(anime.title || 'Detail', 48));

            let html = `
                <nav class="detail-breadcrumb" aria-label="Navigasi">
                    <a href="/v4/home">Beranda</a>
                    <span class="bc-sep" aria-hidden="true">/</span>
                    <span class="bc-current" title="${titleSafe}">${bcTitle}</span>
                </nav>
                <div class="detail-header">
                    <div class="detail-poster" style="background-image: url('${escapeAttr(poster)}');" role="img" aria-label="Poster ${titleSafe}"></div>
                    <div class="detail-info">
                        <span class="detail-title-accent" aria-hidden="true"></span>
                        <h1 class="detail-title">${titleSafe}</h1>
                        ${anime.alternative_title ? `<p class="detail-subtitle">${escapeHtml(anime.alternative_title)}</p>` : ''}
                        ${anime.description ? `<div class="detail-description">${escapeHtml(anime.description)}</div>` : ''}
                        <div class="info-grid">
                            ${anime.info ? Object.entries(anime.info).map(([key, value]) => `
                                <div class="info-item">
                                    <div class="info-label">${escapeHtml(key)}</div>
                                    <div class="info-value">${escapeHtml(value)}</div>
                                </div>
                            `).join('') : ''}
                        </div>
                    </div>
                </div>
            `;

            const episodeCount = anime.episodes && anime.episodes.length ? anime.episodes.length : 0;

            html += `<section class="episodes-section" aria-labelledby="episodes-heading">`;
            html += `
                <div class="section-head">
                    <h2 class="episodes-title" id="episodes-heading">Daftar Episode</h2>
                    <span class="section-badge">${episodeCount} Episode</span>
                </div>
            `;

            if (episodeCount > 0) {
                html += `<div class="episodes-list">`;
                html += anime.episodes.map(ep => {
                    const episodeSlug = ep.slug || extractSlugFromUrl(ep.url || ep.href || '');
                    const episodeUrl = episodeSlug ? `/v4/episode?slug=${encodeURIComponent(episodeSlug)}` : '#';

                    return `
                        <a href="${episodeUrl}" class="episode-card">
                            <div class="episode-title">${escapeHtml(ep.title)}</div>
                            ${ep.date ? `<div class="episode-date">${escapeHtml(ep.date)}</div>` : ''}
                        </a>
                    `;
                }).join('');
                html += `</div>`;
            } else {
                html += `<p class="detail-empty">Belum ada episode yang tersedia untuk judul ini.</p>`;
            }

            html += `</section>`;

            container.innerHTML = html;
        }

        function showError(message) {
            document.getElementById('loadingContainer').style.display = 'none';
            document.getElementById('errorContainer').innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
            document.getElementById('errorContainer').style.display = 'block';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        function escapeAttr(text) {
            return escapeHtml(text).replace(/'/g, '&#39;');
        }

        function truncateText(text, max) {
            const s = String(text);
            return s.length > max ? `${s.slice(0, max - 1)}…` : s;
        }

        function extractSlugFromUrl(url) {
            if (!url) return '';

            try {
                const path = url.startsWith('http') ? new URL(url).pathname : url;
                return path.replace(/^\/+|\/+$/g, '');
            } catch (e) {
                console.error('[V4 Detail] Error extracting slug:', e);
                return url;
            }
        }

        function initSidebarToggle() {
            const menuToggle = document.getElementById('menuToggle');
            const menuCloseBtn = document.getElementById('menuCloseBtn');
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebarBackdrop');

            if (!menuToggle || !sidebar) return;

            menuToggle.addEventListener('click', () => {
                sidebar.classList.add('active');
                if (backdrop) backdrop.classList.add('active');
                document.body.classList.add('sidebar-open');
            });

            const closeSidebar = () => {
                sidebar.classList.remove('active');
                if (backdrop) backdrop.classList.remove('active');
                document.body.classList.remove('sidebar-open');
                document.body.style.overflow = '';
            };

            if (menuCloseBtn) menuCloseBtn.addEventListener('click', closeSidebar);
            if (backdrop) backdrop.addEventListener('click', closeSidebar);

            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape' && sidebar.classList.contains('active')) {
                    closeSidebar();
                }
            });
        }

        function initMobileSearch() {
            const searchIconBtn = document.getElementById('searchIconBtn');
            const searchCloseBtn = document.getElementById('searchCloseBtn');
            const searchInput = document.getElementById('searchInput');
            const searchContainer = document.querySelector('.search-container');

            if (!searchIconBtn || !searchContainer) return;

            searchIconBtn.addEventListener('click', () => {
                searchContainer.classList.add('active');
                if (searchInput) searchInput.focus();
            });

            if (searchCloseBtn) {
                searchCloseBtn.addEventListener('click', () => {
                    searchContainer.classList.remove('active');
                    if (searchInput) searchInput.value = '';
                });
            }

            if (searchInput) {
                searchInput.addEventListener('keypress', (event) => {
                    if (event.key === 'Enter') searchAnime();
                });
            }
        }

        function searchAnime() {
            const searchInput = document.getElementById('searchInput');
            if (!searchInput) return;
            const query = searchInput.value.trim();
            if (query) {
                window.location.href = `/v4/search?q=${encodeURIComponent(query)}`;
            }
        }
    </script>
    <script src="/shared/server-select.js"></script>
    <script>
        (function () {
            var topbar = document.getElementById('v4Topbar');
            if (topbar) {
                window.addEventListener('scroll', function () {
                    topbar.classList.toggle('scrolled', window.scrollY > 24);
                }, { passive: true });
            }
        })();
    </script>
</body>
</html>
