<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>V11 Detail</title><link rel="stylesheet" href="/styles.css"><link rel="stylesheet" href="/mobile.css"><link rel="stylesheet" href="/v11/v11.css"></head><body class="server-v11"><div class="home-layout" id="app"></div><script src="/v11/v11.js"></script><script src="/server-select.js"></script><script>
const slug=V11.params().get('slug')||location.pathname.split('/').pop();
app.innerHTML=V11.shell('list')+`<main class="main-content detail-page">${V11.topbar()}<div id="content"><div class="loading" role="status" aria-live="polite">Memuat detail...</div></div></main>`; V11.bindSearch();
(async()=>{try{const d=await V11.api(`/api/v11/oploverz/anime/${V11.enc(slug)}`); document.title=`${d.title} - V11`; const eps=d.episodes||[]; const latest=eps[eps.length-1]; const recs=d.recommendations||d.related||d.similar||[]; V11.$('#content').innerHTML=`<section class="detail-hero"><div class="detail-poster"><img src="${V11.escapeHtml(d.poster||'')}" alt="${V11.escapeHtml(d.title||'Poster anime')}" loading="eager" decoding="async" onerror="this.src='https://placehold.co/400x600/111/fff?text=Oploverz'"></div><div class="detail-info"><div class="detail-kicker">Detail Anime</div><h1>${V11.escapeHtml(d.title)}</h1>${d.japanese_title?`<p class="detail-jp">${V11.escapeHtml(d.japanese_title)}</p>`:''}<div class="detail-meta">${(d.genres||[]).map(g=>`<span class="pill">${V11.escapeHtml(g.name||g)}</span>`).join('')}${d.status?`<span class="pill">${V11.escapeHtml(d.status)}</span>`:''}${d.type?`<span class="pill">${V11.escapeHtml(d.type)}</span>`:''}${d.score?`<span class="pill">⭐ ${V11.escapeHtml(d.score)}</span>`:''}</div>${d.description?`<p class="detail-desc">${V11.escapeHtml(d.description)}</p>`:''}${latest?`<div class="detail-actions"><a class="btn" href="/v11/episode?slug=${V11.enc(d.slug)}&episode=${V11.enc(latest.episode_num)}">▶ Tonton Episode ${V11.escapeHtml(latest.episode_num)}</a><a class="btn secondary" href="#episodes">Lihat Episode</a></div>`:''}</div></section><section class="section" id="episodes"><div class="section-header"><div><h2>Episode (${eps.length})</h2><p class="section-subtitle">Pilih episode untuk mulai menonton.</p></div></div><div class="episode-grid">${eps.map(e=>`<a class="episode-btn" href="/v11/episode?slug=${V11.enc(d.slug)}&episode=${V11.enc(e.episode_num)}" aria-label="Tonton episode ${V11.escapeHtml(e.episode_num)}"><span>Episode</span><strong>${V11.escapeHtml(e.episode_num)}</strong></a>`).join('')||'<div class="empty-state"><div class="empty-icon">📭</div><h3>Belum ada episode</h3><p class="muted">Episode belum tersedia untuk anime ini.</p></div>'}</div></section>${recs.length?`<section class="section detail-recommendations"><div class="section-header"><div><h2>Rekomendasi</h2><p class="section-subtitle">Anime lain yang mungkin kamu suka.</p></div></div><div class="grid">${recs.slice(0,12).map(V11.card).join('')}</div></section>`:''}`;}catch(e){V11.$('#content').innerHTML=`<div class="error" role="alert">${V11.escapeHtml(e.message)}</div>`;}})();
</script></body></html>
