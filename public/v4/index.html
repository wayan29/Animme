<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimMe V4 - Anichin</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/mobile.css">
    <style>
        /* V4 home — scoped polish (Anichin coral identity, aligned with V3/V10 home patterns) */
        .v4-home-page {
            --v4-bg: #0f1019;
            --v4-panel: #1a1a2e;
            --v4-card: #16213e;
            --v4-border: rgba(255, 107, 107, 0.12);
            --v4-border-strong: rgba(255, 107, 107, 0.28);
            --v4-muted: rgba(255, 255, 255, 0.62);
            --v4-primary: #ff6b6b;
            --v4-primary-soft: rgba(255, 107, 107, 0.14);
            --v4-accent: #ffd700;
            --v4-shadow: 0 14px 40px rgba(8, 10, 24, 0.45);
            --v4-radius: 14px;
        }

        .v4-home-page.server-v4 {
            --primary-color: #ff6b6b;
            --secondary-color: #ee5a6f;
            --accent-color: #ffd700;
        }

        .v4-home-page.home-with-sidebar .content-area {
            background:
                radial-gradient(circle at 6% 0%, rgba(255, 107, 107, 0.14) 0%, transparent 40%),
                radial-gradient(circle at 94% 6%, rgba(238, 90, 111, 0.08) 0%, transparent 36%),
                var(--v4-bg);
        }

        .v4-home-page.home-with-sidebar .sidebar {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-right-color: var(--v4-border);
        }

        .v4-home-page.home-with-sidebar .sidebar .logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, rgba(255, 107, 107, 0.85) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .v4-home-page.home-with-sidebar .sidebar .nav-link {
            border-left: 3px solid transparent;
        }

        .v4-home-page.home-with-sidebar .sidebar .nav-link:hover,
        .v4-home-page.home-with-sidebar .sidebar .nav-link.active {
            background: var(--v4-primary-soft);
            border-left-color: var(--v4-primary);
            color: #fff;
        }

        .v4-home-page.home-with-sidebar .sidebar .nav-link.active {
            font-weight: 600;
        }

        .v4-home-page.home-with-sidebar .server-select:hover,
        .v4-home-page.home-with-sidebar .server-select:focus {
            border-color: rgba(255, 107, 107, 0.55);
            box-shadow: 0 0 0 3px var(--v4-primary-soft);
        }

        .v4-home-page.home-with-sidebar .topbar {
            border-bottom: 1px solid var(--v4-border);
            background: linear-gradient(180deg, rgba(15, 16, 25, 0.96) 0%, rgba(15, 16, 25, 0.82) 70%, transparent 100%);
        }

        .v4-home-page.home-with-sidebar .topbar.scrolled {
            background: rgba(15, 16, 25, 0.97);
            border-bottom-color: var(--v4-border-strong);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }

        .v4-home-page .topbar-title {
            color: #fff;
            font-weight: 600;
        }

        .v4-home-page .topbar .search-input {
            background: rgba(12, 14, 28, 0.9);
            border: 1px solid var(--v4-border);
            border-radius: 999px;
            padding: 10px 18px;
            min-width: 200px;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .v4-home-page .topbar .search-input:focus {
            outline: none;
            border-color: rgba(255, 107, 107, 0.55);
            box-shadow: 0 0 0 3px var(--v4-primary-soft);
        }

        .v4-home-page .topbar .search-btn {
            border-radius: 999px;
            padding: 10px 20px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--v4-primary) 0%, var(--secondary-color) 100%);
            border: none;
            color: #fff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .v4-home-page .topbar .search-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.35);
        }

        .v4-home-page .menu-toggle:hover {
            background-color: var(--v4-primary-soft);
            border-color: rgba(255, 107, 107, 0.45);
        }

        .v4-home-page .hero-carousel {
            margin-top: 0;
            height: min(58vh, 520px);
            min-height: 360px;
            border-radius: 0 0 var(--v4-radius) var(--v4-radius);
            border-bottom: 1px solid var(--v4-border);
            box-shadow: var(--v4-shadow);
        }

        .v4-home-page .carousel-image {
            position: absolute;
        }

        .v4-home-page .carousel-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                90deg,
                rgba(15, 16, 25, 0.92) 0%,
                rgba(15, 16, 25, 0.55) 45%,
                rgba(15, 16, 25, 0.25) 100%
            );
            z-index: 1;
        }

        .v4-home-page .carousel-slide {
            align-items: flex-end;
            padding-bottom: 56px;
        }

        .v4-home-page .carousel-content {
            position: relative;
            z-index: 2;
            padding-bottom: 8px;
        }

        .v4-home-page .carousel-title {
            font-size: clamp(1.6rem, 4vw, 2.75rem);
            line-height: 1.15;
        }

        .v4-home-page .carousel-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }

        .v4-home-page .carousel-badge,
        .v4-home-page .carousel-type,
        .v4-home-page .carousel-rating {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.08);
            color: #e8e8f0;
        }

        .v4-home-page .carousel-badge {
            background: var(--v4-primary-soft);
            border-color: rgba(255, 107, 107, 0.35);
            color: #ffc9c9;
        }

        .v4-home-page .carousel-rating {
            color: var(--v4-accent);
            border-color: rgba(255, 215, 0, 0.25);
        }

        .v4-home-page .carousel-btn-watch {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, var(--v4-primary) 0%, var(--secondary-color) 100%);
            box-shadow: 0 10px 24px rgba(255, 107, 107, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .v4-home-page .carousel-btn-watch:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(255, 107, 107, 0.45);
        }

        .v4-home-page .carousel-btn {
            border-radius: 12px;
            border: 1px solid var(--v4-border);
            background: rgba(8, 10, 20, 0.55);
            backdrop-filter: blur(8px);
        }

        .v4-home-page .carousel-btn:hover {
            border-color: rgba(255, 107, 107, 0.45);
            background: rgba(8, 10, 20, 0.78);
        }

        .v4-home-page .indicator.active::before {
            background-color: var(--v4-primary);
        }

        .v4-home-page .main-content {
            padding-top: 28px;
            padding-bottom: 32px;
        }

        .v4-home-page .anime-section {
            margin-bottom: 44px;
            padding-top: 22px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .v4-home-page .anime-section:first-of-type {
            border-top: none;
            padding-top: 8px;
        }

        .v4-home-page .section-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .v4-home-page .section-head .section-title {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
            color: #fff;
            font-size: 1.45rem;
            position: relative;
        }

        .v4-home-page .section-head .section-title::after {
            content: '';
            display: block;
            width: 48px;
            height: 3px;
            margin-top: 10px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--v4-primary), transparent);
        }

        .v4-home-page .section-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 2.25rem;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--v4-accent);
            background: rgba(255, 215, 0, 0.12);
            border: 1px solid rgba(255, 215, 0, 0.28);
        }

        .v4-home-page .anime-row .anime-card {
            border-radius: var(--v4-radius);
            background: linear-gradient(160deg, rgba(26, 26, 46, 0.9) 0%, rgba(22, 33, 62, 0.95) 100%);
            border: 1px solid var(--v4-border);
            box-shadow: 0 8px 22px rgba(8, 10, 24, 0.35);
        }

        .v4-home-page .anime-row .anime-card:hover {
            transform: translateY(-6px);
            border-color: var(--v4-border-strong);
            box-shadow: 0 16px 32px rgba(255, 107, 107, 0.28);
        }

        .v4-home-page .anime-row .anime-poster {
            position: relative;
            overflow: hidden;
            background: #101018;
        }

        .v4-home-page .anime-row .anime-poster img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
            transition: transform 0.35s ease;
        }

        .v4-home-page .anime-row .anime-card:hover .anime-poster img {
            transform: scale(1.04);
        }

        .v4-home-page .anime-row .anime-poster::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.5) 0%, transparent 45%);
        }

        .v4-home-page .anime-badge,
        .v4-home-page .anime-type {
            position: absolute;
            z-index: 2;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 700;
            backdrop-filter: blur(6px);
        }

        .v4-home-page .anime-badge {
            top: 10px;
            left: 10px;
            background: rgba(255, 107, 107, 0.92);
            color: #fff;
        }

        .v4-home-page .anime-type {
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.9);
        }

        .v4-home-page .anime-row .anime-info {
            background: transparent;
        }

        .v4-home-page .anime-rating {
            color: var(--v4-accent);
        }

        @keyframes v4-home-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .v4-home-page .loading {
            font-size: 0.95rem;
            color: var(--v4-muted);
            padding: 28px 20px;
            border-radius: var(--v4-radius);
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--v4-border);
            position: relative;
            overflow: hidden;
        }

        .v4-home-page .loading::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 107, 0.06), transparent);
            background-size: 200% 100%;
            animation: v4-home-shimmer 1.6s ease-in-out infinite;
            pointer-events: none;
        }

        .v4-home-page .hero-carousel .loading {
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: rgba(0, 0, 0, 0.35);
        }

        .v4-home-page .error-message {
            text-align: center;
            padding: 24px 20px;
            border-radius: var(--v4-radius);
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffbcbc;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .v4-home-page .anime-row .error-message {
            grid-column: 1 / -1;
        }

        .v4-home-page .footer {
            margin-top: auto;
            padding: 26px 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.35);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--v4-muted);
            font-size: 0.88rem;
        }

        @media (max-width: 768px) {
            .v4-home-page .hero-carousel {
                height: 48vh;
                min-height: 300px;
                border-radius: 0;
            }

            .v4-home-page .carousel-slide {
                padding-bottom: 48px;
            }

            .v4-home-page .main-content {
                padding-top: 20px;
            }

            .v4-home-page .anime-section {
                margin-bottom: 36px;
            }

            .v4-home-page .section-head {
                align-items: center;
            }

            .v4-home-page .anime-row .anime-poster img {
                height: 220px;
            }

            .v4-home-page .topbar .search-container.active {
                border-bottom: 1px solid var(--v4-border);
            }

            .v4-home-page .topbar .search-container.active .search-input {
                border-radius: 12px;
            }
        }
    </style>
</head>
<body class="server-v4 home-with-sidebar v4-home-page">
    <div class="home-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="logo" onclick="window.location.href='/v4/home'">AnimMe V4</h1>
                <button class="sidebar-close" id="menuCloseBtn" aria-label="Tutup menu">×</button>
            </div>
            <div class="sidebar-server">
                <span class="server-label">Pilih Server</span>
                <div class="server-select-wrapper">
                    <select id="serverSelect" class="server-select">
                        <option value="v1">V1 - Otakudesu</option>
                        <option value="v2">V2 - Samehadaku</option>
                        <option value="v3">V3 - Kuramanime</option>
                        <option value="v4" selected>V4 - Anichin</option>
                        <option value="v5">V5 - Anoboy</option>
                        <option value="v6">V6 - AnimeIndo</option>
                        <option value="v7">V7 - Nekopoi</option>
                        <option value="v8">V8 - Kusonime</option>
                        <option value="v9">V9 - Auratail</option>
                        <option value="v10">V10 - Vidku</option>
                    </select>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a href="/v4/home" class="nav-link active">🏠 Beranda</a>
                <a href="/v4/completed" class="nav-link">✅ Selesai Tayang</a>
            </nav>
        </aside>

        <div class="content-area">
            <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
            <header class="topbar" id="v4Topbar">
                <button class="menu-toggle" id="menuToggle" aria-label="Buka menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <div class="topbar-title" onclick="window.location.href='/v4/home'">AnimMe V4</div>
                <div class="search-container">
                    <button class="search-icon-mobile" id="searchIconBtn" aria-label="Cari anime">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </button>
                    <input type="search" id="searchInput" autocomplete="off" enterkeyhint="search" placeholder="Cari anime..." class="search-input">
                    <button type="button" onclick="searchAnime()" class="search-btn">Cari</button>
                    <button class="search-close-btn" id="searchCloseBtn" aria-label="Tutup pencarian">×</button>
                </div>
            </header>

            <div class="hero-carousel" id="heroCarousel" aria-label="Rekomendasi anime">
                <div class="carousel-container" id="carouselContainer">
                    <div class="loading" role="status">Memuat banner…</div>
                </div>
                <button type="button" class="carousel-btn prev" id="carouselPrev" aria-label="Slide sebelumnya">‹</button>
                <button type="button" class="carousel-btn next" id="carouselNext" aria-label="Slide berikutnya">›</button>
                <div class="carousel-indicators" id="carouselIndicators"></div>
            </div>

            <main class="main-content">
                <div id="errorContainer" style="display:none;"></div>

                <section class="anime-section" aria-labelledby="sec-popular">
                    <div class="section-head">
                        <h2 class="section-title" id="sec-popular">🔥 Sedang Populer Hari Ini</h2>
                        <span class="section-badge" id="popularCount" aria-label="Jumlah anime">0</span>
                    </div>
                    <div class="anime-row" id="popularToday">
                        <div class="loading" role="status">Memuat anime populer…</div>
                    </div>
                </section>

                <section class="anime-section" aria-labelledby="sec-latest">
                    <div class="section-head">
                        <h2 class="section-title" id="sec-latest">⚡ Update Terbaru</h2>
                        <span class="section-badge" id="latestCount" aria-label="Jumlah anime">0</span>
                    </div>
                    <div class="anime-row" id="latestReleases">
                        <div class="loading" role="status">Memuat anime terbaru…</div>
                    </div>
                </section>
            </main>

            <footer class="footer">
                <p>AnimMe V4 — Powered by Anichin</p>
            </footer>
        </div>
    </div>

    <script src="/v4/app.js"></script>
    <script src="/shared/server-select.js"></script>
    <script>
        (function () {
            var topbar = document.getElementById('v4Topbar');
            if (topbar) {
                window.addEventListener('scroll', function () {
                    topbar.classList.toggle('scrolled', window.scrollY > 24);
                }, { passive: true });
            }
        })();
    </script>
</body>
</html>
