<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>V11 Anime List</title><link rel="stylesheet" href="/styles.css"><link rel="stylesheet" href="/mobile.css"><link rel="stylesheet" href="/v11/v11.css"></head><body class="server-v11"><div class="home-layout" id="app"></div><script src="/v11/v11.js"></script><script src="/server-select.js"></script><script>
const page=Math.max(1,parseInt(V11.params().get('page')||'1',10));
app.innerHTML=V11.shell('list')+`<main class="main-content">${V11.topbar()}<section class="hero"><h1>Anime List</h1><p class="muted">Halaman ${page}</p></section><div class="grid" id="grid"><div class="loading">Memuat...</div></div><div class="pagination" id="pager"></div></main>`; V11.bindSearch();
(async()=>{try{const data=await V11.api(`/api/v11/oploverz/anime-list/${page}`); V11.renderGrid(V11.$('#grid'),data.anime_list||[]); const m=data.meta||{}; V11.$('#pager').innerHTML=`${page>1?`<a class="btn secondary" href="/v11/anime-list?page=${page-1}">← Prev</a>`:''}<span class="pill">${m.current_page||page} / ${m.last_page||1}</span>${(m.last_page||1)>page?`<a class="btn secondary" href="/v11/anime-list?page=${page+1}">Next →</a>`:''}`;}catch(e){V11.$('#grid').innerHTML=`<div class="error">${V11.escapeHtml(e.message)}</div>`;}})();
</script></body></html>
