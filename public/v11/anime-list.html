<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>V11 Anime List</title><link rel="stylesheet" href="/styles.css"><link rel="stylesheet" href="/mobile.css"><link rel="stylesheet" href="/v11/v11.css"></head><body class="server-v11"><div class="home-layout" id="app"></div><script src="/v11/v11.js"></script><script src="/server-select.js"></script><script>
const qs=V11.params(); const page=Math.max(1,parseInt(qs.get('page')||'1',10));
const filterKeys=['hot','mature','censored','season','genres','genre','type','sortBy','sort_by','pageSize'];
function currentFilterParams(nextPage=page){const p=new URLSearchParams(); p.set('page',nextPage); filterKeys.forEach(k=>{const v=qs.get(k); if(v) p.set(k,v);}); return p.toString();}
function setFilter(){const p=new URLSearchParams(); const sort=V11.$('#sortSelect').value; const genre=V11.$('#genreSelect').value; const type=V11.$('#typeSelect').value; const pageSize=V11.$('#pageSizeSelect').value; const season=V11.$('#seasonInput').value.trim(); if(sort&&sort!=='default')p.set('sortBy',sort); if(genre)p.set('genres',genre); if(type)p.set('type',type); if(pageSize&&pageSize!=='10')p.set('pageSize',pageSize); if(season)p.set('season',season); location.href=`/v11/anime-list?${p.toString()}`;}
function withFilter(key,value){const p=new URLSearchParams(qs); p.delete('page'); p.set(key,value); return `/v11/anime-list?${p.toString()}`;}
function renderActiveFilters(genreName=''){const items=[]; const sort=qs.get('sortBy')||qs.get('sort_by'); const genre=qs.get('genres')||qs.get('genre'); ['hot','mature','censored','type','season','pageSize'].forEach(k=>{const v=qs.get(k); if(v)items.push(`${k}: ${v}`);}); if(sort)items.unshift(`sort: ${sort}`); if(genre)items.unshift(`genre: ${genreName||genre}`); V11.$('#activeFilters').innerHTML=items.length?items.map(v=>`<span class="pill">${V11.escapeHtml(v)}</span>`).join(''):'<span class="muted">Gunakan filter untuk mempersempit daftar anime.</span>';}
function renderEmpty(){V11.$('#grid').innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><h3>Tidak ada anime ditemukan</h3><p class="muted">Coba ubah genre, tipe, season, atau reset filter.</p><a class="btn secondary" href="/v11/anime-list">Reset Filter</a></div>';}
app.innerHTML=V11.shell('list')+`<main class="main-content anime-list-page">${V11.topbar()}<section class="hero anime-list-hero"><div class="list-hero-title"><span class="pill">Katalog Oploverz</span><h1>Anime List</h1><p class="muted">Halaman ${page} · filter seri, genre, tipe, dan season.</p><div id="activeFilters" class="active-filters"></div></div><div class="filter-panel"><div class="filter-grid"><select id="sortSelect"><option value="default">Urutkan Berdasarkan: Default</option><option value="releaseDate-desc">Tanggal Rilis (Terbaru)</option><option value="releaseDate-asc">Tanggal Rilis (Terlama)</option><option value="createdAt-desc">Dibuat (Terbaru)</option><option value="createdAt-asc">Dibuat (Terlama)</option><option value="title-asc">Judul (A-Z)</option><option value="title-desc">Judul (Z-A)</option></select><select id="genreSelect"><option value="">Pilih Genre</option></select><select id="typeSelect"><option value="">Pilih Tipe</option><option>BD</option><option>Movie</option><option>ONA</option><option>OVA</option><option>Special</option><option>TV</option></select><select id="pageSizeSelect"><option value="10">10 item</option><option value="20">20 item</option><option value="50">50 item</option></select><input id="seasonInput" class="search-input" placeholder="Season, contoh: summer-2025"></div><div class="filter-actions"><button id="applyBtn" class="btn">Terapkan</button><a id="hotBtn" class="btn secondary" href="#">🔥 Hot</a><a id="safeBtn" class="btn secondary" href="#">Safe</a><a id="uncensoredBtn" class="btn secondary" href="#">Uncensored</a><a class="btn secondary" href="/v11/anime-list">Reset</a></div><small class="filter-hint">Tips: gunakan format season seperti <b>summer-2025</b>, <b>winter-2024</b>.</small></div></section><div class="grid" id="grid"><div class="list-skeleton"><span></span><span></span><span></span><span></span><span></span></div></div><div class="pagination list-pager" id="pager"></div></main>`; V11.bindSearch();
V11.$('#sortSelect').value=qs.get('sortBy')||qs.get('sort_by')||'default'; V11.$('#typeSelect').value=qs.get('type')||''; V11.$('#pageSizeSelect').value=qs.get('pageSize')||'10'; V11.$('#seasonInput').value=qs.get('season')||''; V11.$('#hotBtn').href=withFilter('hot','true'); V11.$('#safeBtn').href=withFilter('mature','false'); V11.$('#uncensoredBtn').href=withFilter('censored','false'); V11.$('#applyBtn').addEventListener('click',setFilter); V11.$('#seasonInput').addEventListener('keydown',e=>{if(e.key==='Enter')setFilter();}); renderActiveFilters();
(async()=>{try{const [genres,data]=await Promise.all([V11.api('/api/v11/oploverz/genres'),V11.api(`/api/v11/oploverz/anime-list?${currentFilterParams(page)}`)]); V11.$('#genreSelect').innerHTML+=""+(genres.genres||[]).map(g=>`<option value="${V11.escapeHtml(g.slug)}">${V11.escapeHtml(g.name)}</option>`).join(''); V11.$('#genreSelect').value=qs.get('genres')||qs.get('genre')||''; const selectedGenre=V11.$('#genreSelect').selectedOptions[0]?.textContent||''; renderActiveFilters(selectedGenre&&V11.$('#genreSelect').value?selectedGenre:''); const items=data.anime_list||[]; if(items.length)V11.renderGrid(V11.$('#grid'),items); else renderEmpty(); const m=data.meta||{}; const note=data.type_filter_limited?'<span class="pill">Tipe difilter seperti upstream client-side.</span>':''; V11.$('#pager').innerHTML=`${note}${page>1?`<a class="btn secondary" href="/v11/anime-list?${currentFilterParams(page-1)}">← Prev</a>`:''}<span class="pill pager-count">Halaman ${m.current_page||page} dari ${m.last_page||1}</span>${(m.last_page||1)>page?`<a class="btn secondary" href="/v11/anime-list?${currentFilterParams(page+1)}">Next →</a>`:''}`;}catch(e){V11.$('#grid').innerHTML=`<div class="error">${V11.escapeHtml(e.message)}</div>`;}})();
</script></body></html>
